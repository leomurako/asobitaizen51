<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドット＆ボックス - Deluxe Edition</title>
    <style>
        :root { --bg-color: #f5f7fb; --text-color: #2d3748; --accent-color: #4a90e2; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; user-select: none; }
        
        .hud { display: flex; gap: 40px; margin-bottom: 25px; background: #fff; padding: 12px 30px; border-radius: 30px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.04); font-weight: bold; }
        .score { font-size: 16px; }
        .turn-indicator { color: var(--accent-color); font-weight: bold; }

        .board-wrapper { background: #fff; padding: 25px; border-radius: 24px; border: 1px solid #cbd5e1; box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        
        /* 縦4マス、横6マスに合わせたピッタリのボードサイズに調整 */
        .board { position: relative; width: 270px; height: 180px; }

        /* ボックス（陣地） */
        .box { position: absolute; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; border-radius: 4px; transition: background-color 0.3s; }
        .box.p1 { background-color: rgba(74, 144, 226, 0.15); color: #4a90e2; }
        .box.p2 { background-color: rgba(229, 62, 62, 0.15); color: #e53e3e; }

        /* 線（辺）の基本設計 */
        .line { position: absolute; background-color: #f1f5f9; cursor: pointer; transition: background-color 0.2s; border-radius: 3px; z-index: 10; }
        .line:hover:not(.taken) { background-color: #cbd5e1; }
        .line.taken.p1 { background-color: #4a90e2; cursor: default; }
        .line.taken.p2 { background-color: #e53e3e; cursor: default; }

        .line.horizontal { height: 6px; }
        .line.vertical { width: 6px; }

        /* 点（ドット）の基本設計 */
        .dot { position: absolute; width: 12px; height: 12px; background-color: #475569; border-radius: 50%; z-index: 20; }

        .controls { margin-top: 25px; }

        /* ダイアログ */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #ffffff; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 85%; animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 10px; font-size: 20px; }
        .modal-card p { margin: 0 0 20px; font-size: 14px; color: #64748b; }
        .btn-modal { background: var(--accent-color); color: #fff; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="score">あなた: <span id="score-p1">0</span></div>
        <div class="turn-indicator" id="turn-text">あなたのターン</div>
        <div class="score" id="p2-score-label">相手: <span id="score-p2">0</span></div>
    </div>

    <div class="board-wrapper">
        <div class="board" id="board">
            <!-- JSで点、線、ボックスが指定のサイズ(4x6)で動的生成されます -->
        </div>
    </div>

    <div class="controls">
        <button class="btn-modal" onclick="resetGame()">リセット</button>
    </div>

    <div class="modal" id="alert-modal">
        <div class="modal-card">
            <h2 id="alert-title">通知</h2>
            <p id="alert-desc">メッセージ</p>
            <button class="btn-modal" onclick="closeAlert()">閉じる</button>
        </div>
    </div>

    <div class="modal" id="result-overlay">
        <div class="modal-card">
            <h2 id="result-title">勝ち！</h2>
            <p id="result-desc">おめでとうございます！</p>
            <button class="btn-modal" onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        // 指示に基づき、縦4マス（猟犬・縦線数相当）x 横6マスのサイズを設定
        const rowsOfBoxes = 4; // 縦の線の数
        const colsOfBoxes = 6; // 横の線の数
        const step = 45;       // マス目のピクセルサイズ（270px x 180pxに収めるための最適値）

        let linesState = {}; 
        let boxesState = []; 
        let currentPlayer = 1;
        let gameOver = false;
        let scores = [0, 0];

        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode') || 'vs_player'; 
        const difficulty = urlParams.get('diff') || 'normal';  

        const boardEl = document.getElementById('board');
        const turnText = document.getElementById('turn-text');

        function initGame() {
            linesState = {};
            boxesState = Array(rowsOfBoxes * colsOfBoxes).fill(0);
            currentPlayer = 1;
            gameOver = false;
            scores = [0, 0];

            document.getElementById('score-p1').innerText = 0;
            document.getElementById('score-p2').innerText = 0;
            document.getElementById('p2-score-label').innerHTML = gameMode === 'vs_cpu' ? `CPU: <span id="score-p2">0</span>` : `相手: <span id="score-p2">0</span>`;
            turnText.innerText = "あなたのターン";
            document.getElementById('result-overlay').style.display = 'none';
            closeAlert();

            buildBoardDOM();
        }

        // 変数(step)に基づき、ミリ単位で正確に配置する自動レイアウト計算
        function buildBoardDOM() {
            boardEl.innerHTML = '';

            // 1. ボックスの生成
            for (let r = 0; r < rowsOfBoxes; r++) {
                for (let c = 0; c < colsOfBoxes; c++) {
                    const box = document.createElement('div');
                    box.className = 'box';
                    box.id = `box-${r}-${c}`;
                    box.style.left = `${c * step + 3}px`;
                    box.style.top = `${r * step + 3}px`;
                    box.style.width = `${step - 6}px`;
                    box.style.height = `${step - 6}px`;
                    boardEl.appendChild(box);
                }
            }

            // 2. 水平の線（Horizontal）の生成
            for (let r = 0; r <= rowsOfBoxes; r++) {
                for (let c = 0; c < colsOfBoxes; c++) {
                    const id = `h-${r}-${c}`;
                    linesState[id] = 0;
                    const line = document.createElement('div');
                    line.className = 'line horizontal';
                    line.id = id;
                    line.style.left = `${c * step}px`;
                    line.style.top = `${r * step - 3}px`;
                    line.style.width = `${step}px`;
                    line.addEventListener('click', () => handleLineClick(id));
                    boardEl.appendChild(line);
                }
            }

            // 3. 垂直の線（Vertical）の生成
            for (let r = 0; r < rowsOfBoxes; r++) {
                for (let c = 0; c <= colsOfBoxes; c++) {
                    const id = `v-${r}-${c}`;
                    linesState[id] = 0;
                    const line = document.createElement('div');
                    line.className = 'line vertical';
                    line.id = id;
                    line.style.left = `${c * step - 3}px`;
                    line.style.top = `${r * step}px`;
                    line.style.height = `${step}px`;
                    line.addEventListener('click', () => handleLineClick(id));
                    boardEl.appendChild(line);
                }
            }

            // 4. 点（ドット）の生成
            for (let r = 0; r <= rowsOfBoxes; r++) {
                for (let c = 0; c <= colsOfBoxes; c++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dot.style.left = `${c * step - 6}px`;
                    dot.style.top = `${r * step - 6}px`;
                    boardEl.appendChild(dot);
                }
            }
        }

        function handleLineClick(lineId) {
            if (gameOver) return;
            if (gameMode === 'vs_cpu' && currentPlayer === 2) return;

            const turnSwitched = claimLine(lineId, currentPlayer);

            if (boxesState.every(b => b !== 0)) {
                gameOver = true;
                setTimeout(showFinalResult, 500); 
                return;
            }

            if (turnSwitched) {
                switchTurn();
            }
        }

        function claimLine(lineId, player) {
            if (linesState[lineId] !== 0) return false;

            linesState[lineId] = player;
            const lineEl = document.getElementById(lineId);
            lineEl.classList.add('taken', player === 1 ? 'p1' : 'p2');

            const completedBoxes = checkBoxes(player);
            if (completedBoxes > 0) {
                scores[player - 1] += completedBoxes;
                document.getElementById('score-p1').innerText = scores[0];
                document.getElementById('score-p2').innerText = scores[1];
                return false; 
            }
            return true; 
        }

        function checkBoxes(player) {
            let completed = 0;
            for (let r = 0; r < rowsOfBoxes; r++) {
                for (let c = 0; c < colsOfBoxes; c++) {
                    const boxIdx = r * colsOfBoxes + c;
                    if (boxesState[boxIdx] === 0) {
                        const top = `h-${r}-${c}`;
                        const bottom = `h-${r+1}-${c}`;
                        const left = `v-${r}-${c}`;
                        const right = `v-${r}-${c+1}`;

                        if (linesState[top] !== 0 && linesState[bottom] !== 0 && 
                            linesState[left] !== 0 && linesState[right] !== 0) {
                            boxesState[boxIdx] = player;
                            const boxEl = document.getElementById(`box-${r}-${c}`);
                            boxEl.classList.add(player === 1 ? 'p1' : 'p2');
                            boxEl.innerText = player === 1 ? 'A' : 'B';
                            completed++;
                        }
                    }
                }
            }
            return completed;
        }

        function switchTurn() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            turnText.innerText = currentPlayer === 1 ? "あなたのターン" : (gameMode === 'vs_cpu' ? "CPUが思考中..." : "Player 2 のターン");

            if (!gameOver && gameMode === 'vs_cpu' && currentPlayer === 2) {
                setTimeout(cpuMove, 900);
            }
        }

        function cpuMove() {
            if (gameOver) return;

            const emptyLines = Object.keys(linesState).filter(id => linesState[id] === 0);
            if (emptyLines.length === 0) return;

            let choice = emptyLines[0];

            if (difficulty === 'easy') {
                choice = emptyLines[Math.floor(Math.random() * emptyLines.length)];
            } else {
                let winLine = findWinningLine();
                if (winLine) {
                    choice = winLine;
                } else {
                    const safeLines = emptyLines.filter(lineId => !willGiveOpponentPoint(lineId));
                    if (safeLines.length > 0) {
                        choice = safeLines[Math.floor(Math.random() * safeLines.length)];
                    } else {
                        choice = emptyLines[Math.floor(Math.random() * emptyLines.length)];
                    }
                }
            }

            const turnSwitched = claimLine(choice, 2);

            if (boxesState.every(b => b !== 0)) {
                gameOver = true;
                setTimeout(showFinalResult, 500);
                return;
            }

            if (turnSwitched) {
                switchTurn();
            } else {
                setTimeout(cpuMove, 900);
            }
        }

        function findWinningLine() {
            const emptyLines = Object.keys(linesState).filter(id => linesState[id] === 0);
            for (let lineId of emptyLines) {
                linesState[lineId] = 2; 
                let completed = 0;
                for (let r = 0; r < rowsOfBoxes; r++) {
                    for (let c = 0; c < colsOfBoxes; c++) {
                        const boxIdx = r * colsOfBoxes + c;
                        if (boxesState[boxIdx] === 0) {
                            const top = `h-${r}-${c}`, bottom = `h-${r+1}-${c}`, left = `v-${r}-${c}`, right = `v-${r}-${c+1}`;
                            if (linesState[top] !== 0 && linesState[bottom] !== 0 && linesState[left] !== 0 && linesState[right] !== 0) {
                                completed++;
                            }
                        }
                    }
                }
                linesState[lineId] = 0; 
                if (completed > 0) return lineId;
            }
            return null;
        }

        function willGiveOpponentPoint(lineId) {
            linesState[lineId] = 2; 
            let dangerous = false;
            for (let r = 0; r < rowsOfBoxes; r++) {
                for (let c = 0; c < colsOfBoxes; c++) {
                    const boxIdx = r * colsOfBoxes + c;
                    if (boxesState[boxIdx] === 0) {
                        const top = `h-${r}-${c}`, bottom = `h-${r+1}-${c}`, left = `v-${r}-${c}`, right = `v-${r}-${c+1}`;
                        let filledSides = 0;
                        if (linesState[top] !== 0) filledSides++;
                        if (linesState[bottom] !== 0) filledSides++;
                        if (linesState[left] !== 0) filledSides++;
                        if (linesState[right] !== 0) filledSides++;
                        if (filledSides === 3) {
                            dangerous = true; 
                        }
                    }
                }
            }
            linesState[lineId] = 0; 
            return dangerous;
        }

        function showCustomAlert(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-modal').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        function showFinalResult() {
            const overlay = document.getElementById('result-overlay');
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');

            descEl.innerText = `あなた ${scores[0]}マス - ${scores[1]}マス ${gameMode === 'vs_cpu' ? 'CPU' : 'Player 2'}`;

            if (scores[0] === scores[1]) {
                titleEl.innerText = "🤝 引き分け";
                titleEl.style.color = "#718096";
            } else if (scores[0] > scores[1]) {
                titleEl.innerText = "🎉 あなたの勝ち！";
                titleEl.style.color = "#4a90e2";
            } else {
                titleEl.innerText = gameMode === 'vs_cpu' ? "💻 CPUの勝ち！" : "🎉 Player 2 の勝ち！";
                titleEl.style.color = "#e53e3e";
            }
            overlay.style.display = 'flex';
        }

        function resetGame() { initGame(); }
        initGame();
    </script>
</body>
</html>
