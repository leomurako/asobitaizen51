<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コネクトフォー - Deluxe Edition</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --board-frame: #4a90e2; /* 新しいテーマに合わせた洗練されたブルー */
            --text-color: #2d3748;
            --accent-color: #4a90e2;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; user-select: none;
        }

        .header-panel {
            display: flex; align-items: center; gap: 30px; margin-bottom: 25px;
            background: #ffffff; padding: 10px 25px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
        }

        .score-box { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; }
        .mini-chip { width: 18px; height: 18px; border-radius: 50%; }
        .mini-chip.yellow { background: radial-gradient(circle at 35% 35%, #fffb00, #ff8c00); }
        .mini-chip.red { background: radial-gradient(circle at 35% 35%, #ff4d4d, #b30000); }
        .turn-indicator { font-size: 14px; font-weight: 700; color: var(--accent-color); }

        /* コネクトフォーのボード */
        .board-wrapper {
            background: #cbd5e1; padding: 12px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 4px solid #94a3b8;
        }
        .board {
            display: grid; grid-template-columns: repeat(7, 52px); grid-template-rows: repeat(6, 52px);
            gap: 6px; background-color: #0f172a; padding: 8px; border-radius: 12px; /* 穴の裏側の暗い隙間 */
        }

        .cell {
            position: relative; cursor: pointer;
            width: 100%; height: 100%;
        }

        /* 重なり順（z-index）のバグを回避する擬似要素マスク */
        .cell::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* 中央が透明で、周囲がボードのフレーム色（ブルー）になるグラデーション */
            background: radial-gradient(circle, transparent 58%, var(--board-frame) 59%);
            border-radius: 4px;
            z-index: 2; /* チップより手前に描画する */
            pointer-events: none;
        }

        /* 落下アニメーション */
        @keyframes dropEffect {
            0% { transform: translateY(-400px); }
            60% { transform: translateY(8px); }
            85% { transform: translateY(-3px); }
            100% { transform: translateY(0); }
        }

        .chip {
            position: absolute; width: 84%; height: 84%; top: 8%; left: 8%;
            border-radius: 50%; 
            z-index: 1; /* マスク（z-index:2）の奥に配置する */
            animation: dropEffect 0.45s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            box-shadow: inset 1px 1px 4px rgba(255,255,255,0.4), 0 3px 6px rgba(0,0,0,0.3);
        }
        .chip.yellow { background: radial-gradient(circle at 35% 35%, #fffb00 0%, #ff8c00 80%); }
        .chip.red { background: radial-gradient(circle at 35% 35%, #ff4d4d 0%, #b30000 80%); }

        /* カラム選択のハイライト */
        .cell:hover::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.08); border-radius: 50%;
            z-index: 3; pointer-events: none;
        }

        /* ダイアログ（警告・パス代替用） */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card {
            background: #ffffff; padding: 25px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 85%;
            animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 10px; font-size: 20px; color: var(--text-color); }
        .modal-card p { margin: 0 0 20px; font-size: 14px; color: #64748b; line-height: 1.5; }
        .btn-modal { background: var(--accent-color); color: #fff; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }

        /* リザルトオーバーレイ */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .result-card { text-align: center; animation: popUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .result-title { font-size: 36px; font-weight: 900; color: var(--accent-color); margin-bottom: 10px; }
        .result-desc { font-size: 16px; margin-bottom: 25px; color: #64748b; }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="score-box"><div class="mini-chip yellow"></div><span>イエロー</span></div>
        <div class="turn-indicator" id="turn-text">手番待機中</div>
        <div class="score-box"><div class="mini-chip red"></div><span>レッド</span></div>
    </div>

    <div class="board-wrapper">
        <div class="board" id="board"></div>
    </div>

    <!-- カスタム通知ダイアログ -->
    <div class="modal" id="alert-modal">
        <div class="modal-card">
            <h2 id="alert-title">通知</h2>
            <p id="alert-desc">メッセージ</p>
            <button class="btn-modal" onclick="closeAlert()">閉じる</button>
        </div>
    </div>

    <!-- 勝敗リザルト -->
    <div class="result-overlay" id="result-overlay">
        <div class="result-card">
            <div class="result-title" id="result-title">イエローの勝ち！</div>
            <div class="result-desc" id="result-desc">見事な4個連鎖です！</div>
            <button class="btn-modal" style="padding: 12px 35px; font-size: 15px;" onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        const cols = 7;
        const rows = 6;
        let board = [];
        let currentPlayer = 1; // 1: Yellow, 2: Red
        let gameOver = false;

        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode') || 'vs_player'; 
        const difficulty = urlParams.get('diff') || 'normal';  

        const boardEl = document.getElementById('board');
        const turnText = document.getElementById('turn-text');

        function initGame() {
            board = Array(rows).fill(null).map(() => Array(cols).fill(0));
            currentPlayer = 1;
            gameOver = false;
            turnText.innerText = "イエローの手番";
            document.getElementById('result-overlay').style.display = 'none';
            closeAlert();
            createBoardDOM();
        }

        function createBoardDOM() {
            boardEl.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleColClick(c));
                    boardEl.appendChild(cell);
                }
            }
        }

        function handleColClick(col) {
            if (gameOver) return;
            if (gameMode === 'vs_cpu' && currentPlayer === 2) return;

            if (dropChip(col, currentPlayer)) {
                endTurn();
            }
        }

        function dropChip(col, player) {
            for (let r = rows - 1; r >= 0; r--) {
                if (board[r][col] === 0) {
                    board[r][col] = player;
                    
                    const idx = r * cols + col;
                    const cell = boardEl.children[idx];
                    const chip = document.createElement('div');
                    chip.className = `chip ${player === 1 ? 'yellow' : 'red'}`;
                    cell.appendChild(chip);
                    return true;
                }
            }
            return false;
        }

        function getLowestRow(col, tempBoard) {
            for (let r = rows - 1; r >= 0; r--) {
                if (tempBoard[r][col] === 0) return r;
            }
            return -1;
        }

        function endTurn() {
            if (checkWin(board)) {
                gameOver = true;
                showFinalResult(currentPlayer);
                return;
            }

            if (board.every(row => row.every(cell => cell !== 0))) {
                gameOver = true;
                showFinalResult(0);
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            turnText.innerText = currentPlayer === 1 ? "イエローの手番" : (gameMode === 'vs_cpu' ? "CPUが思考中..." : "レッドの手番");

            if (!gameOver && gameMode === 'vs_cpu' && currentPlayer === 2) {
                setTimeout(cpuMove, 900);
            }
        }

        function cpuMove() {
            if (gameOver) return;

            const validCols = [];
            for (let c = 0; c < cols; c++) {
                if (board[0][c] === 0) validCols.push(c);
            }

            if (validCols.length === 0) return;

            let chosenCol = validCols[0];

            if (difficulty === 'easy') {
                chosenCol = validCols[Math.floor(Math.random() * validCols.length)];
            } else {
                let winCol = findWinningColumn(2);
                if (winCol !== -1) {
                    chosenCol = winCol;
                } else {
                    let blockCol = findWinningColumn(1);
                    if (difficulty === 'hard' && blockCol !== -1) {
                        chosenCol = blockCol;
                    } else {
                        const priority = [3, 2, 4, 1, 5, 0, 6];
                        chosenCol = priority.find(c => validCols.includes(c)) ?? validCols[0];
                    }
                }
            }

            dropChip(chosenCol, 2);
            endTurn();
        }

        function findWinningColumn(player) {
            for (let c = 0; c < cols; c++) {
                let r = getLowestRow(c, board);
                if (r !== -1) {
                    board[r][c] = player;
                    const isWin = checkWin(board);
                    board[r][c] = 0;
                    if (isWin) return c;
                }
            }
            return -1;
        }

        function checkWin(b) {
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const p = b[r][c];
                    if (p === 0) continue;
                    for (let [dr, dc] of dirs) {
                        let cnt = 1;
                        for (let step = 1; step < 4; step++) {
                            let nr = r + dr * step, nc = c + dc * step;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && b[nr][nc] === p) {
                                cnt++;
                            } else break;
                        }
                        if (cnt === 4) return true;
                    }
                }
            }
            return false;
        }

        function showCustomAlert(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-modal').style.display = 'flex';
        }

        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        function showFinalResult(winner) {
            const overlay = document.getElementById('result-overlay');
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');

            if (winner === 0) {
                titleEl.innerText = "🤝 引き分け";
                descEl.innerText = "盤面がすべてチップで埋まりました。";
                titleEl.style.color = "#718096";
            } else if (gameMode === 'vs_cpu') {
                if (winner === 1) {
                    titleEl.innerText = "🎉 あなたの勝ち！";
                    descEl.innerText = "見事な四並びを達成しました！";
                    titleEl.style.color = "#4a90e2";
                } else {
                    titleEl.innerText = "💻 CPUの勝ち！";
                    descEl.innerText = "CPUに先を越されてしまいました。";
                    titleEl.style.color = "#e53e3e";
                }
            } else {
                titleEl.innerText = winner === 1 ? "🎉 イエローの勝ち！" : "🎉 レッドの勝ち！";
                descEl.innerText = "一直線に4つのチップを並べました。";
                titleEl.style.color = "#4a90e2";
            }
            overlay.style.display = 'flex';
        }

        function resetGame() { initGame(); }
        initGame();
    </script>
</body>
</html>
