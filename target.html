<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>的あて - Deluxe Edition</title>
    <style>
        :root { --bg-color: #f5f7fb; --text-color: #2d3748; --accent-color: #4a90e2; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; user-select: none; }
        
        .hud { display: flex; gap: 40px; margin-bottom: 15px; background: #fff; padding: 10px 30px; border-radius: 20px; font-weight: bold; border: 1px solid #e2e8f0; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .timer-text { color: #e53e3e; }

        .canvas-container { background: #d6e4ff; padding: 10px; border-radius: 24px; border: 4px solid #cbd5e1; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        canvas { display: block; border-radius: 12px; background-color: #eaf2f8; cursor: crosshair; }

        .instructions { font-size: 11px; opacity: 0.6; margin-top: 15px; text-align: center; font-weight: bold; line-height: 1.5; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #ffffff; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 85%; animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 10px; font-size: 20px; color: var(--accent-color); }
        .modal-card p { margin: 0 0 20px; font-size: 14px; color: #64748b; }
        .btn-modal { background: var(--accent-color); color: #fff; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="score">SCORE: <span id="score">0</span></div>
        <div style="color:var(--accent-color);" id="status-text">的あてゲーム</div>
        <div class="timer-text">TIME: <span id="timer">30</span>s</div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="480" height="320"></canvas>
    </div>

    <div class="instructions">
        射撃：画面内の動く的を、マウスクリック（タップ）で撃ち抜きます！<br>
        ※的の中心（黄色）に当てるほど得点が高く、スピードの速い金の的（50点）はチャンス！
    </div>

    <!-- 勝敗リザルト -->
    <div class="modal" id="result-overlay">
        <div class="modal-card">
            <h2 id="result-title">タイムアップ！</h2>
            <p id="result-desc">スコア: 0点</p>
            <button class="btn-modal" onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script {nonce}>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 的オブジェクト { x, y, r, speed, scoreVal, isGold, active, yIndex }
        let targets = [];
        let score = 0;
        let timeLeft = 30;
        let gameOver = false;
        let gameTimer = null;

        let mouseX = 0, mouseY = 0;
        let shots = []; // 射撃時のエフェクト用波紋 { x, y, r, opacity }

        function initGame() {
            targets = [];
            score = 0;
            timeLeft = 30;
            gameOver = false;
            shots = [];

            document.getElementById('score').innerText = 0;
            document.getElementById('timer').innerText = 30;
            document.getElementById('result-overlay').style.display = 'none';

            // 的の初期生成
            for (let i = 0; i < 4; i++) {
                spawnTarget(i);
            }

            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                if (gameOver) return;
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', () => {
            if (gameOver) return;

            // 射撃エフェクト追加
            shots.push({ x: mouseX, y: mouseY, r: 2, opacity: 1 });

            // 的との当たり判定（手前から順にスキャン）
            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                if (!t.active) continue;

                const dist = Math.hypot(mouseX - t.x, mouseY - t.y);
                if (dist < t.r) {
                    // 的中！中心に近いほど得点
                    let pointsEarned = t.scoreVal;
                    if (dist < t.r * 0.3) {
                        pointsEarned *= 2; // bullseye
                        document.getElementById('status-text').innerText = "🎯 BULLSEYE!!";
                    } else {
                        document.getElementById('status-text').innerText = "HIT!";
                    }

                    score += pointsEarned;
                    document.getElementById('score').innerText = score;

                    t.active = false; // 撃破
                    
                    // すぐに同じレーンに次の的を生成
                    setTimeout(() => { spawnTarget(t.yIndex); }, 800);
                    break; // 1クリックで1枚まで
                }
            }
        });

        function spawnTarget(yIndex) {
            const isGold = Math.random() < 0.2; // 20%で金の的
            const r = isGold ? 16 : 24;
            const speed = (Math.random() * 1.5 + (isGold ? 2.5 : 1.2)) * (Math.random() < 0.5 ? 1 : -1);
            const x = speed > 0 ? -40 : canvas.width + 40;
            const y = 60 + yIndex * 60; // 4つのレーン

            targets[yIndex] = {
                x, y, r,
                speed,
                scoreVal: isGold ? 50 : 10,
                isGold,
                active: true,
                yIndex
            };
        }

        function gameLoop() {
            if (gameOver) return;

            // 1. 的の移動
            targets.forEach(t => {
                if (!t.active) return;
                t.x += t.speed;

                // 画面外に出たら再スポーン
                if (t.speed > 0 && t.x > canvas.width + 40) {
                    spawnTarget(t.yIndex);
                } else if (t.speed < 0 && t.x < -40) {
                    spawnTarget(t.yIndex);
                }
            });

            // 2. 射撃エフェクト（フェードアウト）
            shots.forEach((s, idx) => {
                s.r += 2;
                s.opacity -= 0.08;
                if (s.opacity <= 0) shots.splice(idx, 1);
            });

            // 3. 描画
            drawGallery();

            requestAnimationFrame(gameLoop);
        }

        function drawGallery() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景：美しい夕焼け・青空グラデーション
            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, '#dbeafe');
            sky.addColorStop(1, '#ffffff');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 的スタンドの棚板線
            ctx.strokeStyle = 'rgba(0,0,0,0.06)';
            ctx.lineWidth = 4;
            for (let i = 0; i < 4; i++) {
                const y = 60 + i * 60;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // 的の描画（concentricカラー）
            targets.forEach(t => {
                if (!t.active) return;

                ctx.save();
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(0,0,0,0.15)';

                // 的の外殻
                ctx.fillStyle = t.isGold ? '#eab308' : '#e53e3e'; // 金か赤
                ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2); ctx.fill();

                // 内側の白いリング
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(t.x, t.y, t.r * 0.6, 0, Math.PI * 2); ctx.fill();

                // 中心（Bullseye）
                ctx.fillStyle = t.isGold ? '#ca8a04' : '#ffca28'; // ダークゴールドかイエロー
                ctx.beginPath(); ctx.arc(t.x, t.y, t.r * 0.25, 0, Math.PI * 2); ctx.fill();

                ctx.restore();
            });

            // 射撃エフェクト波紋
            shots.forEach(s => {
                ctx.strokeStyle = `rgba(74, 144, 226, ${s.opacity})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.stroke();
            });

            // 照準（クロスヘア：十字架）
            ctx.strokeStyle = 'rgba(74, 144, 226, 0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            // 円
            ctx.arc(mouseX, mouseY, 10, 0, Math.PI * 2);
            // 十字
            ctx.moveTo(mouseX - 15, mouseY); ctx.lineTo(mouseX + 15, mouseY);
            ctx.moveTo(mouseX, mouseY - 15); ctx.lineTo(mouseX, mouseY + 15);
            ctx.stroke();
        }

        function endGame() {
            gameOver = true;
            if (gameTimer) clearInterval(gameTimer);
            document.getElementById('result-desc').innerText = `最終スコア: ${score}点`;
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function resetGame() { initGame(); }
        initGame();
    </script>
</body>
</html>
