<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ナインメンズモリス - Deluxe Edition</title>
    <style>
        :root { --bg-color: #f5f7fb; --board-wood: #2c1a0c; --text-color: #2d3748; --accent-color: #4a90e2; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; user-select: none; }

        .hud { display: flex; gap: 30px; margin-bottom: 20px; background: #fff; padding: 10px 30px; border-radius: 20px; font-weight: bold; border: 1px solid #e2e8f0; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .turn-text { color: var(--accent-color); }

        .board-container { position: relative; width: 320px; height: 320px; background: radial-gradient(circle, #f5d19a 50%, #d8a05c 100%); border: 6px solid #6d4218; border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .node { position: absolute; width: 28px; height: 28px; border-radius: 50%; background-color: #4a2c0f; border: 2px solid #6d4218; transform: translate(-50%, -50%); cursor: pointer; box-shadow: inset 0 3px 5px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10; transition: background-color 0.2s, transform 0.2s; }
        .node.highlight { background-color: rgba(74, 144, 226, 0.85) !important; transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 12px #4a90e2; }
        
        .piece { width: 84%; height: 84%; border-radius: 50%; box-shadow: 0 3px 6px rgba(0,0,0,0.4); pointer-events: none; }
        .piece.p1 { background: radial-gradient(circle at 35% 35%, #ff4d4d, #b30000); }
        .piece.p2 { background: radial-gradient(circle at 35% 35%, #ffffff, #888); border: 1px solid #aaa; box-sizing: border-box; }

        .controls { margin-top: 25px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #ffffff; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 85%; animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 10px; font-size: 20px; }
        .modal-card p { margin: 0 0 20px; font-size: 14px; color: #64748b; }
        .btn-modal { background: var(--accent-color); color: #fff; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <div id="p1-hud">あなた手持ち: 9</div>
        <div class="turn-text" id="status-text">赤の手番 (先手)</div>
        <div id="p2-hud">相手手持ち: 9</div>
    </div>

    <div class="board-container" id="board-container">
        <!-- 3つの同心正方形接続線 -->
        <svg>
            <!-- 外側 -->
            <rect x="20" y="20" width="260" height="260" fill="none" stroke="#6d4218" stroke-width="4"/>
            <!-- 中間 -->
            <rect x="60" y="60" width="180" height="180" fill="none" stroke="#6d4218" stroke-width="4"/>
            <!-- 内側 -->
            <rect x="100" y="100" width="90" height="90" fill="none" stroke="#6d4218" stroke-width="4"/>
            <!-- 十字接続線 -->
            <line x1="150" y1="20" x2="150" y2="100" stroke="#6d4218" stroke-width="4"/>
            <line x1="280" y1="150" x2="190" y2="150" stroke="#6d4218" stroke-width="4"/>
            <line x1="150" y1="280" x2="150" y2="190" stroke="#6d4218" stroke-width="4"/>
            <line x1="20" y1="150" x2="100" y2="150" stroke="#6d4218" stroke-width="4"/>
        </svg>
    </div>

    <div class="controls">
        <button class="btn-modal" onclick="resetGame()">リセット</button>
    </div>

    <!-- カスタム通知ダイアログ -->
    <div class="modal" id="alert-modal">
        <div class="modal-card">
            <h2 id="alert-title">通知</h2>
            <p id="alert-desc">メッセージ</p>
            <button class="btn-modal" onclick="closeAlert()">閉じる</button>
        </div>
    </div>

    <!-- 勝敗リザルト -->
    <div class="modal" id="result-overlay">
        <div class="modal-card">
            <h2 id="result-title">勝ち！</h2>
            <p id="result-desc">おめでとうございます！</p>
            <button class="btn-modal" onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script {nonce}>
        // 24個の頂点座標
        const positions = [
            // 外側 (0〜7)
            { x: 20, y: 20 }, { x: 150, y: 20 }, { x: 280, y: 20 },
            { x: 280, y: 150 }, { x: 280, y: 280 }, { x: 150, y: 280 },
            { x: 20, y: 280 }, { x: 20, y: 150 },
            // 中間 (8〜15)
            { x: 60, y: 60 }, { x: 150, y: 60 }, { x: 240, y: 60 },
            { x: 240, y: 150 }, { x: 240, y: 240 }, { x: 150, y: 240 },
            { x: 60, y: 240 }, { x: 60, y: 150 },
            // 内側 (16〜23)
            { x: 100, y: 100 }, { x: 150, y: 100 }, { x: 200, y: 100 },
            { x: 200, y: 150 }, { x: 200, y: 200 }, { x: 150, y: 200 },
            { x: 100, y: 200 }, { x: 100, y: 150 }
        ];

        // 隣接グラフ
        const adj = {
            0: [1, 7], 1: [0, 2, 9], 2: [1, 3], 3: [2, 4, 11], 4: [3, 5], 5: [4, 6, 13], 6: [5, 7], 7: [6, 0, 15],
            8: [9, 15], 9: [8, 10, 1, 17], 10: [9, 11], 11: [10, 12, 3, 19], 12: [11, 13], 13: [12, 14, 5, 21], 14: [13, 15], 15: [14, 8, 7, 23],
            16: [17, 23], 17: [16, 18, 9], 18: [17, 19], 19: [18, 20, 11], 20: [19, 21], 21: [20, 22, 13], 22: [21, 23], 23: [22, 16, 15]
        };

        // 全16通りのミル（3目並び）組み合わせ
        const mills = [
            [0,1,2], [4,5,6], [0,7,6], [2,3,4],
            [8,9,10], [12,13,14], [8,15,14], [10,11,12],
            [16,17,18], [20,21,22], [16,23,22], [18,19,20],
            [1,9,17], [3,11,19], [5,13,21], [7,15,23]
        ];

        let board = Array(24).fill(0); // 0:空, 1:赤(あなた), 2:青(CPU)
        let unplaced = [9, 9]; // 手持ちの残りコマ数（フェーズ1）
        let currentPlayer = 1;
        let selectedNode = null;
        let activeMillCapture = false; // ミル成立時のコマ消去状態フラグ
        let gameOver = false;

        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode') || 'vs_player';
        const difficulty = urlParams.get('diff') || 'normal';

        const container = document.getElementById('board-container');
        const statusText = document.getElementById('status-text');

        function initGame() {
            board = Array(24).fill(0);
            unplaced = [9, 9];
            currentPlayer = 1;
            selectedNode = null;
            activeMillCapture = false;
            gameOver = false;

            document.getElementById('p2-hud').innerText = gameMode === 'vs_cpu' ? "CPU手持ち: 9" : "相手手持ち: 9";
            document.getElementById('result-overlay').style.display = 'none';
            closeAlert();

            buildBoardDOM();
            updateUI();
        }

        function buildBoardDOM() {
            const existingNodes = container.querySelectorAll('.node');
            existingNodes.forEach(n => container.removeChild(n));

            positions.forEach((pos, idx) => {
                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${idx}`;
                node.style.left = `${pos.x}px`;
                node.style.top = `${pos.y}px`;

                node.addEventListener('click', () => handleNodeClick(idx));
                container.appendChild(node);
            });
        }

        function handleNodeClick(idx) {
            if (gameOver) return;
            if (gameMode === 'vs_cpu' && currentPlayer === 2) return; // CPU操作中

            // 1. ミル成立時の敵のコマ削除フェーズ
            if (activeMillCapture) {
                if (board[idx] !== 0 && board[idx] !== currentPlayer) {
                    // ミルを組んでいない（安全な）コマを優先して削るルール
                    const isInMill = isPartOfMill(idx, board[idx]);
                    const hasNonMillPieces = board.some((val, i) => val === board[idx] && !isPartOfMill(i, val));

                    if (isInMill && hasNonMillPieces) {
                        showCustomAlert("消去不可", "ミル（3並び）を形成しているコマは、他に守られていない単独のコマが残っている場合は消去できません。");
                        return;
                    }

                    board[idx] = 0;
                    activeMillCapture = false;
                    endTurn();
                }
                return;
            }

            // 2. 通常プレイ
            if (unplaced[currentPlayer - 1] > 0) {
                // 【フェーズ1：配置】
                if (board[idx] === 0) {
                    board[idx] = currentPlayer;
                    unplaced[currentPlayer - 1]--;
                    checkPostMoveState(idx);
                }
            } else {
                // 【フェーズ2：スライド移動】
                if (selectedNode === null) {
                    if (board[idx] === currentPlayer) {
                        selectedNode = idx;
                        highlightMoves(idx);
                    }
                } else {
                    if (idx === selectedNode) {
                        selectedNode = null;
                        clearHighlights();
                    } else {
                        const moves = getValidMoves(selectedNode);
                        if (moves.includes(idx)) {
                            board[idx] = currentPlayer;
                            board[selectedNode] = 0;
                            const prevSelected = selectedNode;
                            selectedNode = null;
                            clearHighlights();
                            checkPostMoveState(idx);
                        } else if (board[idx] === currentPlayer) {
                            selectedNode = idx;
                            highlightMoves(idx);
                        }
                    }
                }
            }
        }

        function getValidMoves(fromIdx) {
            const player = board[fromIdx];
            const pieceCount = board.filter(val => val === player).length;
            
            // 3枚以下になると「フライング」ルール発動（ボードのどこにでもワープ移動可能）
            if (pieceCount <= 3) {
                const empty = [];
                board.forEach((val, i) => { if (val === 0) empty.push(i); });
                return empty;
            }

            // 通常は隣接する空きますへのスライド
            return adj[fromIdx].filter(toIdx => board[toIdx] === 0);
        }

        function highlightMoves(fromIdx) {
            clearHighlights();
            const moves = getValidMoves(fromIdx);
            moves.forEach(idx => {
                document.getElementById(`node-${idx}`).classList.add('highlight');
            });
        }

        function clearHighlights() {
            document.querySelectorAll('.node').forEach(n => n.classList.remove('highlight'));
        }

        // ミルに所属しているかチェック
        function isPartOfMill(idx, player) {
            return mills.some(mill => {
                return mill.includes(idx) && mill.every(i => board[i] === player);
            });
        }

        // コマを置いた・移動したあとの判定（新規ミルの成立検知）
        function checkPostMoveState(placedIdx) {
            const isNewMill = mills.some(mill => {
                return mill.includes(placedIdx) && mill.every(i => board[i] === currentPlayer);
            });

            if (isNewMill) {
                // ミルが成立！敵のコマを1枚削る
                activeMillCapture = true;
                statusText.innerText = `ミル成立！消去したい相手のコマをタップしてください`;
                updateUI();

                if (gameMode === 'vs_cpu' && currentPlayer === 2) {
                    setTimeout(cpuCapture, 1000); // CPUの自動消去
                }
            } else {
                endTurn();
            }
        }

        function endTurn() {
            checkGameResult();
            if (gameOver) return;

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            statusText.innerText = currentPlayer === 1 ? "赤の手番です" : (gameMode === 'vs_cpu' ? "CPUの思考中..." : "青の手番です");
            updateUI();

            if (!gameOver && gameMode === 'vs_cpu' && currentPlayer === 2) {
                setTimeout(cpuMove, 1200);
            }
        }

        // CPUのAI思考ロジック
        function cpuMove() {
            if (gameOver || activeMillCapture) return;

            if (unplaced[1] > 0) {
                // フェーズ1：配置
                const empty = [];
                board.forEach((v, i) => { if (v === 0) empty.push(i); });
                
                // ミルを組める手を最優先、相手のリーチを塞ぐ手を次に優先
                let choice = empty[0];
                let bestScore = -1;

                empty.forEach(i => {
                    board[i] = 2; // 仮置き
                    let score = 0;
                    if (isPartOfMill(i, 2)) score += 100; // 攻め
                    board[i] = 1;
                    if (isPartOfMill(i, 1)) score += 80;  // 防えい
                    board[i] = 0;

                    if (score > bestScore) {
                        bestScore = score;
                        choice = i;
                    }
                });

                if (bestScore === -1) {
                    choice = empty[Math.floor(Math.random() * empty.length)];
                }

                board[choice] = 2;
                unplaced[1]--;
                checkPostMoveState(choice);
            } else {
                // フェーズ2：移動
                const moves = [];
                board.forEach((val, fromIdx) => {
                    if (val === 2) {
                        const valid = getValidMoves(fromIdx);
                        valid.forEach(toIdx => {
                            moves.push({ from: fromIdx, to: toIdx });
                        });
                    }
                });

                if (moves.length === 0) {
                    endGame(1); // 動けないCPUの負け
                    return;
                }

                let choice = moves[0];
                let bestScore = -1000;

                moves.forEach(m => {
                    board[m.to] = 2;
                    board[m.from] = 0;
                    let score = 0;
                    if (isPartOfMill(m.to, 2)) score += 100;
                    
                    if (score > bestScore) {
                        bestScore = score;
                        choice = m;
                    }
                    board[m.to] = 0;
                    board[m.from] = 2;
                });

                board[choice.to] = 2;
                board[choice.from] = 0;
                checkPostMoveState(choice.to);
            }
        }

        // ミル成立時に相手のコマを消去するCPUロジック
        function cpuCapture() {
            const targets = [];
            board.forEach((val, i) => {
                if (val === 1) {
                    const inMill = isPartOfMill(i, 1);
                    targets.push({ idx: i, inMill });
                }
            });

            // ミルを構成していないコマを優先
            let choice = null;
            const nonMillTargets = targets.filter(t => !t.inMill);
            if (nonMillTargets.length > 0) {
                choice = nonMillTargets[Math.floor(Math.random() * nonMillTargets.length)].idx;
            } else if (targets.length > 0) {
                choice = targets[Math.floor(Math.random() * targets.length)].idx;
            }

            if (choice !== null) {
                board[choice] = 0;
                activeMillCapture = false;
                showCustomAlert("CPUミル", "CPUにミルを作られ、コマを1枚削られました！");
                endTurn();
            }
        }

        function checkGameResult() {
            // コマが2枚以下になったら負け（フェーズ2以降）
            if (unplaced[0] === 0 && unplaced[1] === 0) {
                const p1Count = board.filter(v => v === 1).length;
                const p2Count = board.filter(v => v === 2).length;

                if (p1Count <= 2) { endGame(2); return; }
                if (p2Count <= 2) { endGame(1); return; }

                // 手詰まりチェック（動かせるコマがない方が負け）
                const nextP = currentPlayer === 1 ? 2 : 1;
                let hasMove = false;
                board.forEach((val, i) => {
                    if (val === nextP && getValidMoves(i).length > 0) hasMove = true;
                });

                if (!hasMove) {
                    endGame(currentPlayer); // 手を打てない側の負け
                }
            }
        }

        function updateUI() {
            document.getElementById('p1-hud').innerText = unplaced[0] > 0 ? `あなた手持ち: ${unplaced[0]}` : `あなた残り: ${board.filter(v=>v===1).length}`;
            const p2Text = unplaced[1] > 0 ? `CPU手持ち: ${unplaced[1]}` : `CPU残り: ${board.filter(v=>v===2).length}`;
            const p2TextPlayer = unplaced[1] > 0 ? `相手手持ち: ${unplaced[1]}` : `相手残り: ${board.filter(v=>v===2).length}`;
            document.getElementById('p2-hud').innerText = gameMode === 'vs_cpu' ? p2Text : p2TextPlayer;

            // コマ描画
            for (let i = 0; i < 24; i++) {
                const node = document.getElementById(`node-${i}`);
                let piece = node.querySelector('.piece');
                const val = board[i];

                if (val !== 0) {
                    if (!piece) {
                        piece = document.createElement('div');
                        node.appendChild(piece);
                    }
                    piece.className = `piece ${val === 1 ? 'p1' : 'p2'}`;
                } else if (piece) {
                    node.removeChild(piece);
                }
            }
        }

        function showCustomAlert(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-modal').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        function endGame(winner) {
            gameOver = true;
            const overlay = document.getElementById('result-overlay');
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');

            if (gameMode === 'vs_cpu') {
                if (winner === 1) {
                    titleEl.innerText = "🎉 あなたの勝ち！";
                    descEl.innerText = "CPUの兵力を削り取り、見事に勝利しました！";
                    titleEl.style.color = "#4a90e2";
                } else {
                    titleEl.innerText = "💻 CPUの勝ち！";
                    descEl.innerText = "CPUにすべての戦略を塞がれてしまいました。";
                    titleEl.style.color = "#e53e3e";
                }
            } else {
                titleEl.innerText = winner === 1 ? "🎉 Player 1 (赤) の勝ち！" : "🎉 Player 2 (白) の勝ち！";
                descEl.innerText = "相手を完封し、勝利を収めました。";
                titleEl.style.color = "#4a90e2";
            }
            overlay.style.display = 'flex';
        }

        function resetGame() { initGame(); }
        initGame();
    </script>
</body>
</html>
