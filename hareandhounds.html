<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウサギと猟犬 - Deluxe Edition</title>
    <style>
        :root { --bg-color: #f5f7fb; --text-color: #2d3748; --accent-color: #4a90e2; }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; user-select: none; }
        .status { font-size: 15px; color: #b8813a; font-weight: bold; margin-bottom: 25px; height: 24px; text-align: center; }
        
        .board-container { position: relative; width: 440px; height: 240px; background: radial-gradient(circle, #f5d19a 50%, #d8a05c 100%); border: 6px solid #6d4218; border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .node { position: absolute; width: 34px; height: 34px; border-radius: 50%; background-color: #4a2c0f; border: 2px solid #6d4218; transform: translate(-50%, -50%); cursor: pointer; box-shadow: inset 0 3px 5px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10; transition: background-color 0.2s, transform 0.2s; }
        .node.highlight { background-color: rgba(74, 144, 226, 0.85) !important; transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 12px #4a90e2; }
        
        .piece { width: 80%; height: 80%; border-radius: 50%; box-shadow: 0 3px 6px rgba(0,0,0,0.3); pointer-events: none; }
        .piece.hound { background: radial-gradient(circle at 35% 35%, #ff4d4d, #b30000); }
        .piece.hare { background: radial-gradient(circle at 35% 35%, #ffffff, #888); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #ffffff; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 85%; animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 10px; font-size: 20px; }
        .modal-card p { margin: 0 0 20px; font-size: 14px; color: #64748b; }
        .btn-modal { background: var(--accent-color); color: #fff; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="status" id="status-text">猟犬(赤)の手番：動かす駒を選択してください</div>

    <div class="board-container" id="board-container">
        <svg>
            <line x1="50" y1="120" x2="390" y2="120" stroke="#6d4218" stroke-width="4"/>
            <line x1="50" y1="120" x2="146" y2="40" stroke="#6d4218" stroke-width="4"/>
            <line x1="50" y1="120" x2="146" y2="200" stroke="#6d4218" stroke-width="4"/>
            <line x1="146" y1="40" x2="146" y2="200" stroke="#6d4218" stroke-width="4"/>
            <line x1="268" y1="40" x2="268" y2="200" stroke="#6d4218" stroke-width="4"/>
            <line x1="146" y1="40" x2="268" y2="40" stroke="#6d4218" stroke-width="4"/>
            <line x1="146" y1="200" x2="268" y2="200" stroke="#6d4218" stroke-width="4"/>
            <line x1="146" y1="40" x2="268" y2="200" stroke="#6d4218" stroke-width="4"/>
            <line x1="146" y1="200" x2="268" y2="40" stroke="#6d4218" stroke-width="4"/>
            <line x1="268" y1="40" x2="390" y2="120" stroke="#6d4218" stroke-width="4"/>
            <line x1="268" y1="200" x2="390" y2="120" stroke="#6d4218" stroke-width="4"/>
            <line x1="146" y1="120" x2="268" y2="120" stroke="#6d4218" stroke-width="4"/>
        </svg>
    </div>

    <!-- カスタム通知ダイアログ -->
    <div class="modal" id="alert-modal">
        <div class="modal-card">
            <h2 id="alert-title">通知</h2>
            <p id="alert-desc">メッセージ</p>
            <button class="btn-modal" onclick="closeAlert()">閉じる</button>
        </div>
    </div>

    <!-- 勝敗リザルト -->
    <div class="modal" id="result-overlay">
        <div class="modal-card">
            <h2 id="result-title">猟犬の勝ち！</h2>
            <p id="result-desc">ウサギを完全に包囲しました！</p>
            <button class="btn-modal" onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        const positions = [
            { x: 50,  y: 120 }, // 0
            { x: 146, y: 40  }, // 1
            { x: 146, y: 120 }, // 2
            { x: 146, y: 200 }, // 3
            { x: 268, y: 40  }, // 4
            { x: 268, y: 120 }, // 5
            { x: 268, y: 200 }, // 6
            { x: 390, y: 120 }  // 7
        ];

        const adj = {
            0: [1, 2, 3],
            1: [0, 2, 4, 5],
            2: [0, 1, 3, 5],
            3: [0, 2, 5, 6],
            4: [1, 5, 7],
            5: [1, 2, 3, 4, 6, 7],
            6: [3, 5, 7],
            7: [4, 5, 6]
        };

        let boardState = [1, 1, 0, 1, 0, 0, 0, 2];
        let currentPlayer = 1; // 1: 猟犬, 2: ウサギ
        let selectedNode = null;
        let gameOver = false;

        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode') || 'vs_player';
        const difficulty = urlParams.get('diff') || 'normal';

        const container = document.getElementById('board-container');
        const statusText = document.getElementById('status-text');

        function initGame() {
            boardState = [1, 1, 0, 1, 0, 0, 0, 2];
            currentPlayer = 1;
            selectedNode = null;
            gameOver = false;
            statusText.innerText = "猟犬(赤)の手番：動かす駒を選択してください";
            document.getElementById('result-overlay').style.display = 'none';
            closeAlert();

            drawBoard();
        }

        function drawBoard() {
            const existingNodes = container.querySelectorAll('.node');
            existingNodes.forEach(n => container.removeChild(n));

            positions.forEach((pos, idx) => {
                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${idx}`; // 明示的な一意のID
                node.style.left = `${pos.x}px`;
                node.style.top = `${pos.y}px`;

                const state = boardState[idx];
                if (state === 1) {
                    node.innerHTML = '<div class="piece hound"></div>';
                } else if (state === 2) {
                    node.innerHTML = '<div class="piece hare"></div>';
                }

                node.addEventListener('click', () => handleNodeClick(idx));
                container.appendChild(node);
            });
        }

        function handleNodeClick(idx) {
            if (gameOver) return;
            if (gameMode === 'vs_cpu' && currentPlayer === 1) return; // CPU操作中の誤動作防止

            if (selectedNode === null) {
                if (boardState[idx] === currentPlayer) {
                    selectedNode = idx;
                    highlightMoves(idx);
                }
            } else {
                if (idx === selectedNode) {
                    selectedNode = null;
                    clearHighlights();
                } else {
                    const validMoves = getValidMoves(selectedNode);
                    if (validMoves.includes(idx)) {
                        boardState[idx] = currentPlayer;
                        boardState[selectedNode] = 0;
                        selectedNode = null;
                        clearHighlights();

                        checkGameResult();
                        if (!gameOver) {
                            currentPlayer = currentPlayer === 1 ? 2 : 1;
                            statusText.innerText = `${currentPlayer === 1 ? '猟犬(赤)' : 'ウサギ(白)'}の手番です`;
                            
                            if (gameMode === 'vs_cpu' && currentPlayer === 1) {
                                setTimeout(cpuHoundMove, 950);
                            }
                        }
                        drawBoard();
                    } else if (boardState[idx] === currentPlayer) {
                        selectedNode = idx;
                        highlightMoves(idx);
                    }
                }
            }
        }

        function getValidMoves(fromIdx) {
            const player = boardState[fromIdx];
            const neighbors = adj[fromIdx];
            const valid = [];

            neighbors.forEach(toIdx => {
                if (boardState[toIdx] === 0) {
                    if (player === 1) {
                        if (positions[toIdx].x >= positions[fromIdx].x) {
                            valid.push(toIdx);
                        }
                    } else {
                        valid.push(toIdx);
                    }
                }
            });
            return valid;
        }

        // 明示的なID指定（document.getElementById）に修正し、SVG変更時の順序バグを解消
        function highlightMoves(fromIdx) {
            clearHighlights();
            const valid = getValidMoves(fromIdx);
            valid.forEach(idx => {
                const targetNode = document.getElementById(`node-${idx}`);
                if (targetNode) targetNode.classList.add('highlight');
            });
        }

        function clearHighlights() {
            const nodes = container.querySelectorAll('.node');
            nodes.forEach(n => n.classList.remove('highlight'));
        }

        function cpuHoundMove() {
            if (gameOver) return;

            const moves = [];
            boardState.forEach((val, fromIdx) => {
                if (val === 1) {
                    const valid = getValidMoves(fromIdx);
                    valid.forEach(toIdx => {
                        moves.push({ from: fromIdx, to: toIdx });
                    });
                }
            });

            if (moves.length === 0) return;

            let choice = moves[0];
            const hareIdx = boardState.indexOf(2);

            if (difficulty === 'easy') {
                choice = moves[Math.floor(Math.random() * moves.length)];
            } else {
                let bestScore = -Infinity;
                moves.forEach(m => {
                    boardState[m.to] = 1;
                    boardState[m.from] = 0;
                    
                    let score = 0;
                    const hDist = Math.abs(positions[m.to].x - positions[hareIdx].x);
                    score -= hDist;

                    if (difficulty === 'hard') {
                        const hareMoves = getValidMoves(hareIdx);
                        score += (3 - hareMoves.length) * 15;
                    }

                    if (score > bestScore) {
                        bestScore = score;
                        choice = m;
                    }

                    boardState[m.to] = 0;
                    boardState[m.from] = 1;
                });
            }

            boardState[choice.to] = 1;
            boardState[choice.from] = 0;

            checkGameResult();
            if (!gameOver) {
                currentPlayer = 2;
                statusText.innerText = "ウサギ(白)の手番です";
            }
            drawBoard();
        }

        function checkGameResult() {
            const hareIdx = boardState.indexOf(2);
            const houndIndices = boardState.map((val, idx) => val === 1 ? idx : -1).filter(idx => idx !== -1);

            const leftmostHoundX = Math.min(...houndIndices.map(idx => positions[idx].x));
            const hareX = positions[hareIdx].x;

            if (hareX < leftmostHoundX) {
                gameOver = true;
                showFinalResult(2, "ウサギが猟犬を交わして完全に脱出しました！");
                return;
            }

            const hareValidMoves = getValidMoves(hareIdx);
            if (hareValidMoves.length === 0) {
                gameOver = true;
                showFinalResult(1, "猟犬がウサギを完全に閉じ込め、包囲しました！");
                return;
            }

            let houndCanMove = false;
            houndIndices.forEach(idx => {
                if (getValidMoves(idx).length > 0) houndCanMove = true;
            });
            if (!houndCanMove) {
                gameOver = true;
                showFinalResult(2, "猟犬がこれ以上身動きできなくなりました！");
            }
        }

        function showCustomAlert(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-modal').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        function showFinalResult(winner, detail) {
            const overlay = document.getElementById('result-overlay');
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');

            descEl.innerText = detail;

            if (gameMode === 'vs_cpu') {
                if (winner === 2) {
                    titleEl.innerText = "🎉 あなたの勝ち！";
                    titleEl.style.color = "#4a90e2";
                } else {
                    titleEl.innerText = "💻 CPUの勝ち！";
                    titleEl.style.color = "#e53e3e";
                }
            } else {
                titleEl.innerText = winner === 1 ? "🎉 猟犬(赤)の勝ち！" : "🎉 ウサギ(白)の勝ち！";
                titleEl.style.color = "#4a90e2";
            }
            overlay.style.display = 'flex';
        }

        function resetGame() { initGame(); }
        initGame();
    </script>
</body>
</html>
