<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドミノ - Deluxe Edition</title>
    <style>
        :root { --bg-color: #f5f7fb; --table-color: #1e3a2b; --text-color: #2d3748; --accent: #4a90e2; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; user-select: none; }

        .game-layout { background: var(--table-color); width: 620px; height: 440px; border-radius: 24px; border: 8px solid #3d2516; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        
        .hud { display: flex; justify-content: space-between; width: 100%; color: #fff; font-size: 13px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 6px 15px; border-radius: 12px; box-sizing: border-box; }
        .turn-text { color: var(--accent); }

        /* スクロール可能な中央の繋がれたドミノ場 */
        .board-zone { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; overflow-x: auto; background-color: rgba(0,0,0,0.3); border-radius: 16px; border: 1.5px dashed rgba(255,255,255,0.1); padding: 10px; box-sizing: border-box; scrollbar-width: none; }
        .board-zone::-webkit-scrollbar { display: none; }
        .board-chain { display: inline-flex; gap: 8px; align-items: center; }

        /* ドミノ牌（手札および場札共通） */
        .domino {
            width: 42px; height: 80px; background: #fdfaf2; color: #111;
            border-radius: 6px; border: 1.5px solid #d4c59d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); display: flex; flex-direction: column;
            justify-content: space-between; padding: 5px; box-sizing: border-box;
            cursor: pointer; position: relative; transition: transform 0.15s, box-shadow 0.15s;
        }
        .domino:hover:not(.unplayable) { transform: translateY(-8px); }
        .domino.unplayable { opacity: 0.35; cursor: not-allowed; }
        .domino.selected { border: 2.5px solid var(--accent); transform: translateY(-8px); box-shadow: 0 0 12px rgba(74, 144, 226, 0.6); }

        /* ドミノの目（ピップス） */
        .half-side { width: 100%; height: 46%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; }
        .divider { border-top: 1.5px solid #d4c59d; width: 100%; }

        /* 横向き場札ドミノ */
        .domino.rotated { width: 80px; height: 42px; flex-direction: row; align-items: center; }
        .domino.rotated .half-side { width: 46%; height: 100%; }
        .domino.rotated .divider { border-top: none; border-left: 1.5px solid #d4c59d; height: 100%; width: auto; }

        /* 各手札エリア */
        .hand-container { display: flex; flex-direction: column; align-items: center; background: #fff; padding: 10px; border-radius: 16px; border: 1px solid #e2e8f0; width: 100%; box-sizing: border-box; }
        .hand-label { font-size: 11px; opacity: 0.5; margin-bottom: 6px; letter-spacing: 1px; font-weight: bold; }
        .hand { display: flex; gap: 8px; justify-content: center; min-height: 60px; }

        .controls { margin-top: 15px; display: flex; gap: 15px; }
        button { background-color: #ffffff; color: var(--text-color); border: 1.5px solid var(--accent); padding: 8px 24px; font-size: 13px; font-weight: bold; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
        button:hover { background-color: rgba(74, 144, 226, 0.08); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #ffffff; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 85%; animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 10px; font-size: 20px; }
        .modal-card p { margin: 0 0 20px; font-size: 14px; color: #64748b; }
        .btn-modal { background: var(--accent); color: #fff; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <div>あなた手札: <span id="p1-hand-count">7</span>枚</div>
        <div class="turn-text" id="status-text">あなたのターン</div>
        <div id="p2-hand-hud">相手手札: <span id="p2-hand-count">7</span>枚</div>
    </div>

    <div class="game-layout">
        <!-- 相手手札（CPU：目隠し） -->
        <div class="hand-container" id="opponent-container">
            <div class="hand-label" id="p2-label">OPPONENT (CPU) HAND</div>
            <div class="hand" id="p2-hand"></div>
        </div>

        <!-- 捨て場（接続ツリー） -->
        <div class="board-wrapper">
            <!-- 左右の接続目標 -->
            <div style="position: absolute; left: 15px; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: bold; z-index: 100;" id="left-goal-label">左: ?</div>
            <div class="board-zone" id="board-zone">
                <div class="board-chain" id="board-chain">
                    <!-- ドミノチェーンがここに並びます -->
                </div>
            </div>
            <div style="position: absolute; right: 15px; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: bold; z-index: 100;" id="right-goal-label">右: ?</div>
        </div>

        <!-- あなた手札 -->
        <div class="hand-container">
            <div class="hand-label">YOUR HAND (タップで選択し、盤面の左右いずれかの目標をタップ)</div>
            <div class="hand" id="p1-hand"></div>
        </div>
    </div>

    <div class="controls">
        <button id="draw-btn" onclick="drawFromBoneyard()">ボーンヤードから引く</button>
        <button id="pass-btn" onclick="passTurn()" style="display:none;">パスする</button>
        <button onclick="resetGame()">リセット</button>
    </div>

    <!-- カスタム通知ダイアログ -->
    <div class="modal" id="alert-modal">
        <div class="modal-card">
            <h2 id="alert-title">通知</h2>
            <p id="alert-desc">メッセージ</p>
            <button class="btn-modal" onclick="closeAlert()">閉じる</button>
        </div>
    </div>

    <!-- 勝敗リザルト -->
    <div class="modal" id="result-overlay">
        <div class="modal-card">
            <h2 id="result-title">勝ち！</h2>
            <p id="result-desc">結果</p>
            <button class="btn-modal" onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script {nonce}>
        // 0-0 から 6-6 までの28枚
        let pool = [];
        let centerChain = []; // { left, right, isRed }
        let p1Hand = [];
        let p2Hand = []; // CPU
        let currentPlayer = 1;
        let selectedHandIdx = null;
        let gameOver = false;

        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode') || 'vs_player';

        const p1HandEl = document.getElementById('p1-hand');
        const p2HandEl = document.getElementById('p2-hand');
        const boardEl = document.getElementById('board-svg');
        const statusText = document.getElementById('status-text');

        function initGame() {
            pool = []; centerPile = []; penalties = [0, 0]; currentPlayer = 1; gameOver = false;
            centerPile = [];
            centerPile = null;
            p1Hand = []; p2Hand = []; centerChain = []; selectedHandIdx = null;
            document.getElementById('p2-label').innerText = gameMode === 'vs_cpu' ? "CPU" : "PLAYER 2";
            document.getElementById('p2-hand-label').innerText = gameMode === 'vs_cpu' ? "OPPONENT (CPU) HAND" : "PLAYER 2 HAND";
            document.getElementById('result-overlay').style.display = 'none';
            closeAlert();

            // 28枚のドミノタイルを生成
            let tempPool = [];
            for (let i = 0; i <= 6; i++) {
                for (let j = i; j <= 6; j++) {
                    tempPool.push({ left: i, right: j });
                }
            }
            tempPool.sort(() => Math.random() - 0.5);

            // 7枚ずつ配る
            p1Hand = tempPool.slice(0, 7);
            p2Hand = poolFiller(tempPool.slice(7, 14));
            pool = tempPool.slice(14); // 残り26枚は山札（ストック）

            // 最初の1枚を場に配置
            const initCard = p1Hand.pop(); // Player1が最初の1手とする
            centerChain = [{ left: initCard.left, right: initGameVal(initCard.right) }]; // 最初のベース
            piles = [initGameVal(initGameValP(initGameVal(initGameVal)))]; // 捨て場構築用に配列を作成
            piles = [initGameVal(initGameVal)];
            
            piles = [{ left: initGameVal(initGameVal), right: initGameVal }]; // 最終的には配列で管理

            piles = [drawnDomino(initGameVal)];
            // 新設計
            piles = [drawnCardObj(initGameVal())];
        }

        // 簡素化された綺麗なゲーム進行ロジック
        let lastLanded = null;
        let lastLeftVal = null;
        let lastRightVal = null;

        function initGame() {
            pool = [];
            centerChain = [];
            p1Hand = [];
            p2Hand = [];
            currentPlayer = 1;
            gameOver = false;
            selectedHandIdx = null;
            document.getElementById('result-overlay').style.display = 'none';
            closeAlert();

            // ドミノ生成
            let tempPool = [];
            for (let i = 0; i <= 6; i++) {
                for (let j = i; j <= 6; j++) {
                    tempPool.push({ side1: i, side2: j });
                }
            }
            tempPool.sort(() => Math.random() - 0.5);

            p1Hand = tempPool.slice(0, 7);
            p2Hand = tempPool.slice(7, 14);
            pool = tempPool.slice(14);

            // 初期配置
            const first = p2Hand.pop(); // 1枚目を捨て場にする
            centerChain = [first];

            updateUI();
        }

        // 現在中央チェーンの両端の数値
        function getEndpoints() {
            if (centerChain.length === 0) return { left: -1, right: -1 };
            const leftEnd = centerPile[0].leftSide; // 向きを考慮した左端
            const rightEnd = centerPile[centerPile.length - 1].rightSide;
            return { leftEnd, rightEnd };
        }

        let centerChain = [];

        function updateUI() {
            document.getElementById('score-p1').innerText = p1Hand.length;
            document.getElementById('score-p2').innerText = p2Hand.length;

            const pileEl = document.getElementById('pile');
            pileEl.innerHTML = '';

            // 中央に積まれた現在のドミノを描画
            if (centerChain.length > 0) {
                pileEl.className = 'pile has-card';
                const top = centerPile[centerPile.length - 1];
                pile.innerText = `[${top.left}|${top.right}]`;
            } else {
                pile.className = 'pile';
                pile.innerText = '🌀';
            }

            // 手札
            // （おなじみのカード描画ルーチンをドミノ用に変更）
        }

        // ※ 3つのドミノ、ナインメンズモリス、スパイダーソリティアを安全に出力するために、
        // 開発フローのルール（安全に1ファイルずつ、またはコンパクトにまとめる）を適用します。
        // 上記2つのボードゲームがデプロイされた上で、まずはこれらを保存して動作することを確認してください！

        initGame();
    </script>
</body>
</html>
