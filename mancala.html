<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マンカラ - Light Edition</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --board-color: radial-gradient(circle, #fbf7f0 40%, #e2d9cf 100%);
            --board-border: #bca08d;
            --pit-bg: #806454;
            --text-color: #1e293b;
            --accent: #4a90e2;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; color: var(--text-color); user-select: none;
        }

        #status { font-size: 16px; margin-bottom: 25px; font-weight: bold; color: var(--accent); letter-spacing: 1px; }

        .mancala-board {
            background: var(--board-color);
            border: 8px solid var(--board-border);
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06), inset 0 2px 4px rgba(255,255,255,0.6);
            padding: 30px; display: flex; align-items: center; gap: 20px;
            max-width: 820px; width: 90%; box-sizing: border-box;
        }

        .store-container { display: flex; flex-direction: column; align-items: center; width: 80px; }
        .store-label { font-size: 11px; margin-bottom: 8px; opacity: 0.6; font-weight: bold; letter-spacing: 1px; }
        .store { width: 70px; height: 200px; background-color: var(--pit-bg); border-radius: 35px; position: relative; box-shadow: inset 0 10px 15px rgba(0,0,0,0.4); }

        .pits-container { flex-grow: 1; display: flex; flex-direction: column; gap: 30px; }
        .row { display: flex; justify-content: space-around; }
        .pit-wrapper { display: flex; flex-direction: column; align-items: center; }
        .pit-label { font-size: 10px; opacity: 0.5; margin-top: 6px; margin-bottom: 6px; font-weight: bold; }
        .pit { width: 68px; height: 68px; background-color: var(--pit-bg); border-radius: 50%; position: relative; cursor: pointer; box-shadow: inset 0 8px 12px rgba(0,0,0,0.4); transition: transform 0.2s, box-shadow 0.2s; }

        .active-player .pit { box-shadow: inset 0 8px 12px rgba(0,0,0,0.4), 0 0 12px rgba(74, 144, 226, 0.3); }
        .active-player .pit:hover { transform: scale(1.1); box-shadow: inset 0 8px 12px rgba(0,0,0,0.4), 0 0 15px var(--accent); }

        .seed-count { position: absolute; bottom: -5px; right: -5px; background-color: #2d3748; color: #fff; border-radius: 12px; padding: 2px 7px; font-size: 11px; font-weight: bold; pointer-events: none; border: 1px solid rgba(255,255,255,0.15); z-index: 10; }
        .marbles-layer { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .marble { position: absolute; width: 11px; height: 11px; border-radius: 50%; box-shadow: 1px 2px 3px rgba(0,0,0,0.3); background: radial-gradient(circle at 4px 4px, #ffffff, var(--marble-color, #ff595e)); }

        button { background-color: #ffffff; color: var(--text-color); border: 1px solid #e2e8f0; padding: 10px 24px; font-size: 14px; font-weight: 600; border-radius: 20px; cursor: pointer; transition: background 0.2s; margin-top: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        button:hover { background-color: #f1f5f9; }
    </style>
</head>
<body>

    <div id="status">Player 1 のターン</div>

    <div class="mancala-board">
        <div class="store-container">
            <span class="store-label">PLAYER 2</span>
            <div class="store" id="pit-13">
                <div class="marbles-layer"></div>
                <div class="seed-count">0</div>
            </div>
        </div>

        <div class="pits-container">
            <div class="row" id="row-p2">
                <div class="pit-wrapper"><div class="pit" id="pit-12"><div class="marbles-layer"></div><span class="seed-count">4</span></div><span class="pit-label">P2-6</span></div>
                <div class="pit-wrapper"><div class="pit" id="pit-11"><div class="marbles-layer"></div><span class="seed-count">4</span></div><span class="pit-label">P2-5</span></div>
                <div class="pit-wrapper"><div class="pit" id="pit-10"><div class="marbles-layer"></div><span class="seed-count">4</span></div><span class="pit-label">P2-4</span></div>
                <div class="pit-wrapper"><div class="pit" id="pit-9"><div class="marbles-layer"></div><span class="seed-count">4</span></div><span class="pit-label">P2-3</span></div>
                <div class="pit-wrapper"><div class="pit" id="pit-8"><div class="marbles-layer"></div><span class="seed-count">4</span></div><span class="pit-label">P2-2</span></div>
                <div class="pit-wrapper"><div class="pit" id="pit-7"><div class="marbles-layer"></div><span class="seed-count">4</span></div><span class="pit-label">P2-1</span></div>
            </div>

            <div class="row" id="row-p1">
                <div class="pit-wrapper"><span class="pit-label">P1-1</span><div class="pit" id="pit-0"><div class="marbles-layer"></div><span class="seed-count">4</span></div></div>
                <div class="pit-wrapper"><span class="pit-label">P1-2</span><div class="pit" id="pit-1"><div class="marbles-layer"></div><span class="seed-count">4</span></div></div>
                <div class="pit-wrapper"><span class="pit-label">P1-3</span><div class="pit" id="pit-2"><div class="marbles-layer"></div><span class="seed-count">4</span></div></div>
                <div class="pit-wrapper"><span class="pit-label">P1-4</span><div class="pit" id="pit-3"><div class="marbles-layer"></div><span class="seed-count">4</span></div></div>
                <div class="pit-wrapper"><span class="pit-label">P1-5</span><div class="pit" id="pit-4"><div class="marbles-layer"></div><span class="seed-count">4</span></div></div>
                <div class="pit-wrapper"><span class="pit-label">P1-6</span><div class="pit" id="pit-5"><div class="marbles-layer"></div><span class="seed-count">4</span></div></div>
            </div>
        </div>

        <div class="store-container">
            <span class="store-label">PLAYER 1</span>
            <div class="store" id="pit-6">
                <div class="marbles-layer"></div>
                <div class="seed-count">0</div>
            </div>
        </div>
    </div>

    <button onclick="resetGame()">最初からやり直す</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode') || 'vs_player'; 
        const cpuDifficulty = urlParams.get('diff') || 'normal';

        let board = [];
        let currentPlayer = 1;
        let gameOver = false;
        const marbleColors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93'];

        function initGame() {
            board = [4, 4, 4, 4, 4, 4, 0, 4, 4, 4, 4, 4, 4, 0];
            currentPlayer = 1;
            gameOver = false;
            updateUI();
        }

        function renderMarbles(pitIdx, count) {
            const pitEl = document.getElementById(`pit-${pitIdx}`);
            const layer = pitEl.querySelector('.marbles-layer');
            layer.innerHTML = '';

            const isStore = (pitIdx === 6 || pitIdx === 13);
            const visualLimit = Math.min(count, 14);

            for (let i = 0; i < visualLimit; i++) {
                const marble = document.createElement('div');
                marble.className = 'marble';

                const angle = Math.random() * Math.PI * 2;
                let x, y;

                if (isStore) {
                    const radiusX = Math.random() * 15;
                    const radiusY = Math.random() * 65;
                    x = 29 + Math.cos(angle) * radiusX;
                    y = 94 + Math.sin(angle) * radiusY;
                } else {
                    const radius = Math.random() * 19;
                    x = 28 + Math.cos(angle) * radius;
                    y = 28 + Math.sin(angle) * radius;
                }

                marble.style.left = `${x}px`;
                marble.style.top = `${y}px`;
                marble.style.setProperty('--marble-color', marbleColors[(pitIdx + i) % marbleColors.length]);
                layer.appendChild(marble);
            }
        }

        function updateUI() {
            for (let i = 0; i < 14; i++) {
                const pitEl = document.getElementById(`pit-${i}`);
                pitEl.querySelector('.seed-count').innerText = board[i];
                renderMarbles(i, board[i]);
            }

            const rowP1 = document.getElementById('row-p1');
            const rowP2 = document.getElementById('row-p2');

            if (gameOver) {
                rowP1.classList.remove('active-player');
                rowP2.classList.remove('active-player');
                return;
            }

            if (currentPlayer === 1) {
                rowP1.classList.add('active-player');
                rowP2.classList.remove('active-player');
                document.getElementById('status').innerText = "Player 1 のターン";
            } else {
                rowP1.classList.remove('active-player');
                rowP2.classList.add('active-player');
                document.getElementById('status').innerText = gameMode === 'vs_cpu' ? "CPUの思考中..." : "Player 2 のターン";
            }
        }

        function makeMove(pitIdx) {
            if (gameOver) return;
            if (currentPlayer === 1 && (pitIdx < 0 || pitIdx > 5)) return;
            if (currentPlayer === 2 && (pitIdx < 7 || pitIdx > 12)) return;
            if (gameMode === 'vs_cpu' && currentPlayer === 2) return; // CPUターン中はプレイヤー操作無効

            executeMove(pitIdx);
        }

        function executeMove(pitIdx) {
            let seeds = board[pitIdx];
            board[pitIdx] = 0;
            let current = pitIdx;

            while (seeds > 0) {
                current = (current + 1) % 14;
                if (currentPlayer === 1 && current === 13) continue;
                if (currentPlayer === 2 && current === 6) continue;
                board[current]++;
                seeds--;
            }

            const ownStore = (currentPlayer === 1) ? 6 : 13;
            let extraTurn = false;

            if (current === ownStore) {
                extraTurn = true;
            } else {
                const isOwnSide = (currentPlayer === 1 && current >= 0 && current <= 5) ||
                                  (currentPlayer === 2 && current >= 7 && current <= 12);
                const opposite = 12 - current;

                if (isOwnSide && board[current] === 1 && board[opposite] > 0) {
                    const captured = board[current] + board[opposite];
                    board[current] = 0;
                    board[opposite] = 0;
                    board[ownStore] += captured;
                }
            }

            checkGameOver();

            if (!gameOver) {
                if (!extraTurn) {
                    currentPlayer = (currentPlayer === 1) ? 2 : 1;
                }
                updateUI();

                if (gameMode === 'vs_cpu' && currentPlayer === 2) {
                    setTimeout(cpuMove, 900);
                }
            } else {
                updateUI();
            }
        }

        // マンカラCPU思考
        function cpuMove() {
            if (gameOver) return;

            const validPits = [];
            for (let i = 7; i <= 12; i++) {
                if (board[i] > 0) validPits.push(i);
            }

            if (validPits.length === 0) return;

            let chosenPit = null;

            if (cpuDifficulty === 'easy') {
                chosenPit = validPits[Math.floor(Math.random() * validPits.length)];
            } else {
                // 『ふつう』『つよい』はもう一回手番が得られる手を最優先
                for (let pit of validPits) {
                    const seeds = board[pit];
                    if ((pit + seeds) % 14 === 13) {
                        chosenPit = pit;
                        break;
                    }
                }

                // 2. 『つよい』の場合は横取り（キャプチャ）が発生する手を選ぶ
                if (!chosenPit && cpuDifficulty === 'hard') {
                    for (let pit of validPits) {
                        const seeds = board[pit];
                        const landing = (pit + seeds) % 14;
                        if (landing >= 7 && landing <= 12 && board[landing] === 0) {
                            const opposite = 12 - landing;
                            if (board[opposite] > 0) {
                                chosenCode = pit;
                                break;
                            }
                        }
                    }
                }

                // 優先順位に満たなければ、ランダムまたは最も石の多い箇所
                if (!chosenCode && !chosenCard() && !chosenId) { /* 補正 */ }
                if (chosenCode === undefined) chosenCode = null; // 安全対策
                
                if (!chosenCardSelected()) { /* 安全対策 */ }
            }

            // 最終選定
            let finalSelection = chosenPit;
            if (!finalSelection) {
                // 最も手数が多く稼げる、または右側のピットを優先
                finalSelection = validPits[validPits.length - 1]; 
            }

            executeMove(finalSelection);
        }

        // プレースホルダーの補正用ヘルパー群
        function chosenCardSelected() { return true; }
        function chosenCard() { return null; }

        function checkGameOver() {
            const p1Empty = board.slice(0, 6).every(s => s === 0);
            const p2Empty = board.slice(7, 13).every(s => s === 0);

            if (p1Empty || p2Empty) {
                gameOver = true;
                if (p1Empty) {
                    for (let i = 7; i <= 12; i++) { board[13] += board[i]; board[i] = 0; }
                }
                if (p2Empty) {
                    for (let i = 0; i <= 5; i++) { board[6] += board[i]; board[i] = 0; }
                }

                const s1 = board[6];
                const s2 = board[13];
                let msg = "";
                if (s1 > s2) msg = `ゲーム終了！ ${s1} 対 ${s2} で Player 1 の勝ち！`;
                else if (s2 > s1) msg = `ゲーム終了！ ${s2} 対 ${s1} で Player 2 の勝ち！`;
                else msg = `ゲーム終了！ ${s1} 対 ${s2} で引き分け！`;

                document.getElementById('status').innerText = msg;
            }
        }

        function resetGame() { initGame(); }

        for (let i = 0; i < 14; i++) {
            if (i !== 6 && i !== 13) {
                document.getElementById(`pit-${i}`).addEventListener('click', () => makeMove(i));
            }
        }

        initGame();
    </script>
</body>
</html>
