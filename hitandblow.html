<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヒット＆ブロー - Deluxe Edition</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --board-color: #f8f1e5;
            --text-color: #2d3748;
            --accent-color: #4a90e2;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; user-select: none;
        }

        .status { font-size: 14px; color: #b8813a; margin-bottom: 20px; font-weight: bold; }

        .board-wrapper {
            background-color: var(--board-color); border: 8px solid #c8b195;
            border-radius: 24px; padding: 20px; width: 310px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .history-container { height: 260px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .history-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px; background-color: #ffffff; border-radius: 10px;
            margin-bottom: 6px; border: 1px solid #e2e8f0;
        }

        .pins-group { display: flex; gap: 8px; }
        .pin {
            width: 25px; height: 25px; border-radius: 50%; background-color: #e2e8f0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); border: 1px solid rgba(0,0,0,0.05);
        }
        .pin.red { background: radial-gradient(circle at 35% 35%, #ff4d4d, #990000); }
        .pin.blue { background: radial-gradient(circle at 35% 35%, #3399ff, #0044cc); }
        .pin.yellow { background: radial-gradient(circle at 35% 35%, #ffff33, #cccc00); }
        .pin.green { background: radial-gradient(circle at 35% 35%, #33cc33, #006600); }
        .pin.orange { background: radial-gradient(circle at 35% 35%, #ff9933, #cc6600); }
        .pin.purple { background: radial-gradient(circle at 35% 35%, #cc33ff, #660099); }

        .result-indicators { display: flex; gap: 6px; font-size: 11px; font-weight: bold; }
        .result-badge { padding: 2px 7px; border-radius: 6px; color: #fff; }
        .result-badge.hit { background-color: #e53e3e; }
        .result-badge.blow { background-color: #dd6b20; }

        .input-row {
            display: flex; justify-content: center; gap: 12px; padding: 12px;
            background-color: #ffffff; border-radius: 12px; margin-bottom: 15px;
            border: 2px dashed #cbd5e1;
        }
        .input-pin {
            width: 32px; height: 32px; border-radius: 50%; background-color: #f1f5f9;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; border: 2px solid transparent;
        }
        .input-pin.active { border-color: var(--accent-color); transform: scale(1.05); }

        .palette { display: flex; justify-content: space-around; background-color: #ffffff; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .palette-color { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.15); transition: transform 0.15s; }
        .palette-color:hover { transform: scale(1.12); }

        /* モーダル */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card {
            background: #ffffff; padding: 25px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 85%;
            animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 10px; font-size: 20px; color: var(--text-color); }
        .modal-card p { margin: 0 0 20px; font-size: 14px; color: #64748b; line-height: 1.5; }
        .btn-modal { background: var(--accent-color); color: #fff; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }

        button {
            width: 100%; background-color: var(--accent-color); color: #ffffff; border: none;
            padding: 12px; font-size: 15px; font-weight: bold; border-radius: 20px; cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--accent-hover); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .reset-btn { background: none; border: none; color: #718096; text-decoration: underline; margin-top: 15px; font-size: 12px; cursor: pointer; width: auto; }
    </style>
</head>
<body>

    <div class="status" id="status-text">正解の4色を推測してください（色の重複なし）</div>

    <div class="board-wrapper">
        <div class="history-container" id="history-box"></div>

        <div class="input-row" id="input-slots">
            <div class="input-pin active" data-index="0"></div>
            <div class="input-pin" data-index="1"></div>
            <div class="input-pin" data-index="2"></div>
            <div class="input-pin" data-index="3"></div>
        </div>

        <div class="palette">
            <div class="palette-color red" data-color="red"></div>
            <div class="palette-color blue" data-color="blue"></div>
            <div class="palette-color yellow" data-color="yellow"></div>
            <div class="palette-color green" data-color="green"></div>
            <div class="palette-color orange" data-color="orange"></div>
            <div class="palette-color purple" data-color="purple"></div>
        </div>

        <button id="submit-btn" onclick="submitGuess()" disabled>決定</button>
    </div>

    <!-- カスタム通知ダイアログ -->
    <div class="modal" id="alert-modal">
        <div class="modal-card">
            <h2 id="alert-title">通知</h2>
            <p id="alert-desc">メッセージ</p>
            <button class="btn-modal" onclick="closeAlert()">閉じる</button>
        </div>
    </div>

    <!-- 勝敗リザルト -->
    <div class="modal" id="result-modal">
        <div class="modal-card">
            <h2 id="result-title">成功！</h2>
            <p id="result-desc">おめでとうございます！</p>
            <div id="solution-box" style="display:flex; justify-content:center; gap:8px; margin-bottom:20px;"></div>
            <button class="btn-modal" onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        const colors = ['red', 'blue', 'yellow', 'green', 'orange', 'purple'];
        let secretCode = [];
        let currentGuess = [null, null, null, null];
        let activeSlotIndex = 0;
        let gameOver = false;
        let attempts = 0;

        const historyBox = document.getElementById('history-box');
        const submitBtn = document.getElementById('submit-btn');
        const statusText = document.getElementById('status-text');
        const inputSlots = document.querySelectorAll('.input-pin');

        function initGame() {
            secretCode = [...colors].sort(() => Math.random() - 0.5).slice(0, 4);
            currentGuess = [null, null, null, null];
            activeSlotIndex = 0;
            gameOver = false;
            attempts = 0;

            historyBox.innerHTML = '';
            statusText.innerText = "正解の4色を推測してください（色の重複なし）";
            submitBtn.disabled = true;
            document.getElementById('result-modal').style.display = 'none';
            closeAlert();
            updateInputSlots();
        }

        function updateInputSlots() {
            inputSlots.forEach((slot, idx) => {
                slot.className = 'input-pin';
                if (idx === activeSlotIndex && !gameOver) {
                    slot.classList.add('active');
                }
                if (currentGuess[idx]) {
                    slot.classList.add(currentGuess[idx]);
                }
            });

            const isFull = currentGuess.every(c => c !== null);
            submitBtn.disabled = !isFull || gameOver;
        }

        document.querySelectorAll('.palette-color').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameOver) return;
                const color = btn.dataset.color;

                if (currentGuess.includes(color)) {
                    const dupIdx = currentGuess.indexOf(color);
                    currentGuess[dupIdx] = null;
                }

                currentGuess[activeSlotIndex] = color;
                findNextActiveSlot();
                updateInputSlots();
            });
        });

        function findNextActiveSlot() {
            for (let i = 0; i < 4; i++) {
                const nextIdx = (activeSlotIndex + i) % 4;
                if (currentGuess[nextIdx] === null) {
                    activeSlotIndex = nextIdx;
                    return;
                }
            }
        }

        inputSlots.forEach(slot => {
            slot.addEventListener('click', () => {
                if (gameOver) return;
                const idx = parseInt(slot.dataset.index);
                activeSlotIndex = idx;
                if (currentGuess[idx]) {
                    currentGuess[idx] = null;
                }
                updateInputSlots();
            });
        });

        function submitGuess() {
            if (gameOver) return;
            attempts++;

            let hit = 0;
            let blow = 0;

            for (let i = 0; i < 4; i++) {
                if (currentGuess[i] === secretCode[i]) {
                    hit++;
                } else if (secretCode.includes(currentGuess[i])) {
                    blow++;
                }
            }

            addHistoryRow(currentGuess, hit, blow);

            if (hit === 4) {
                gameOver = true;
                showFinalResult(true);
            } else if (attempts >= 8) {
                gameOver = true;
                showFinalResult(false);
            } else {
                statusText.innerText = `判定: ${hit}H / ${blow}B (残りの挑戦回数: ${8 - attempts}回)`;
                currentGuess = [null, null, null, null];
                activeSlotIndex = 0;
            }

            updateInputSlots();
        }

        function addHistoryRow(guess, hit, blow) {
            const row = document.createElement('div');
            row.className = 'history-row';

            let pinsHTML = '<div class="pins-group">';
            guess.forEach(color => { pinsHTML += `<div class="pin ${color}"></div>`; });
            pinsHTML += '</div>';

            const resultHTML = `
                <div class="result-indicators">
                    <span class="result-badge hit">${hit} H</span>
                    <span class="result-badge blow">${blow} B</span>
                </div>
            `;
            row.innerHTML = pinsHTML + resultHTML;
            historyBox.appendChild(row);
            historyBox.scrollTop = historyBox.scrollHeight;
        }

        function showCustomAlert(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-modal').style.display = 'flex';
        }

        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        function showFinalResult(isSuccess) {
            const modal = document.getElementById('result-modal');
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');
            const solutionBox = document.getElementById('solution-box');

            solutionBox.innerHTML = '';
            secretCode.forEach(color => {
                const pin = document.createElement('div');
                pin.className = `pin ${color}`;
                pin.style.width = '30px';
                pin.style.height = '30px';
                solutionBox.appendChild(pin);
            });

            if (isSuccess) {
                titleEl.innerText = "🏆 SUCCESS!";
                titleEl.style.color = "#4a90e2";
                descEl.innerText = `見事に ${attempts} 回目の推測で暗号を特定しました！`;
            } else {
                titleEl.innerText = "💀 GAME OVER";
                titleEl.style.color = "#e53e3e";
                descEl.innerText = "正解のコードはこちらでした：";
            }

            modal.style.display = 'flex';
        }

        function resetGame() { initGame(); }
        initGame();
    </script>
</body>
</html>
