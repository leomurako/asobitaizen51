<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スライドパズル - Deluxe Edition</title>
    <style>
        :root { --bg-color: #f5f7fb; --text-color: #2d3748; --accent-color: #4a90e2; }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; user-select: none; }
        #status { font-size: 16px; color: #b8813a; font-weight: bold; margin-bottom: 20px; height: 24px; }
        .board { display: grid; grid-template-columns: repeat(4, 70px); grid-template-rows: repeat(4, 70px); gap: 8px; background-color: #e2e8f0; padding: 12px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid #cbd5e1; }
        .tile { background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); color: var(--text-color); border: 1px solid #cbd5e1; font-size: 22px; font-weight: bold; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.05); transition: transform 0.1s; }
        .tile:active { transform: scale(0.95); }
        .tile.empty { background: transparent; cursor: default; box-shadow: none; pointer-events: none; border: none; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #ffffff; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 85%; animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 10px; font-size: 20px; color: var(--accent-color); }
        .modal-card p { margin: 0 0 20px; font-size: 14px; color: #64748b; }
        .btn-modal { background: var(--accent-color); color: #fff; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status">数字を1〜15の順に並べてください</div>
    <div class="board" id="board"></div>
    <button class="btn-modal" onclick="shuffleTiles()" style="margin-top: 25px;">シャッフル</button>

    <div class="modal" id="result-overlay">
        <div class="modal-card">
            <h2>🎉 パズル完成！</h2>
            <p>見事クリアしました。おめでとうございます！</p>
            <button class="btn-modal" onclick="shuffleTiles()">もう一度挑戦する</button>
        </div>
    </div>

    <script>
        let tiles = [];
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');

        function initGame() {
            tiles = Array.from({ length: 15 }, (_, i) => i + 1);
            tiles.push(0);
            document.getElementById('result-overlay').style.display = 'none';
            shuffleTiles();
        }

        function drawBoard() {
            boardEl.innerHTML = '';
            tiles.forEach((val, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (val === 0) {
                    tile.classList.add('empty');
                } else {
                    tile.innerText = val;
                    tile.addEventListener('click', () => moveTile(idx));
                }
                boardEl.appendChild(tile);
            });
            checkWin();
        }

        function moveTile(idx) {
            const emptyIdx = tiles.indexOf(0);
            const r = Math.floor(idx / 4), c = idx % 4;
            const er = Math.floor(emptyIdx / 4), ec = emptyIdx % 4;
            if ((Math.abs(r - er) + Math.abs(c - ec)) === 1) {
                tiles[emptyIdx] = tiles[idx];
                tiles[idx] = 0;
                drawBoard();
            }
        }

        function shuffleTiles() {
            document.getElementById('result-overlay').style.display = 'none';
            for (let i = 0; i < 200; i++) {
                const emptyIdx = tiles.indexOf(0);
                const r = Math.floor(emptyIdx / 4), c = emptyIdx % 4;
                const possibles = [];
                if (r > 0) possibles.push(emptyIdx - 4);
                if (r < 3) possibles.push(emptyIdx + 4);
                if (c > 0) possibles.push(emptyIdx - 1);
                if (c < 3) possibles.push(emptyIdx + 1);
                const target = possibles[Math.floor(Math.random() * possibles.length)];
                tiles[emptyIdx] = tiles[target];
                tiles[target] = 0;
            }
            statusEl.innerText = "数字を1〜15の順に並べてください";
            drawBoard();
        }

        function checkWin() {
            const isWon = tiles.slice(0, 15).every((val, idx) => val === idx + 1);
            if (isWon) {
                statusEl.innerText = "完成！";
                document.getElementById('result-overlay').style.display = 'flex';
            }
        }

        initGame();
    </script>
</body>
</html>
