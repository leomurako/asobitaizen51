<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clubhouse Games Web - Ultimate Launcher</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --header-bg: rgba(255, 255, 255, 0.9);
            --card-bg: #ffffff;
            --card-border: #e8ecef;
            --card-selected: #4a90e2;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --accent-color: #4a90e2;
            --accent-hover: #357abd;
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 15px 45px rgba(0, 0, 0, 0.12);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: fixed; top: 0; left: 0; z-index: 100;
            box-sizing: border-box;
            transition: opacity 0.3s, transform 0.3s;
        }

        header h1 { font-size: 24px; font-weight: 800; letter-spacing: 3px; margin: 0 0 4px; text-transform: uppercase; }
        header p { color: var(--text-muted); font-size: 11px; margin: 0; letter-spacing: 0.5px; }

        .screen-container {
            width: 100%;
            height: calc(100vh - 80px);
            margin-top: 80px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1), transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        /* カルーセル */
        .carousel-wrapper {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 50px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }
        .carousel-wrapper::-webkit-scrollbar { display: none; }

        .carousel {
            display: inline-flex;
            gap: 30px;
            padding: 0 calc(50vw - 110px);
        }

        .game-icon-card {
            width: 160px;
            height: 190px;
            background-color: var(--card-bg);
            border-radius: 24px;
            border: 2px solid var(--card-border);
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.2s, box-shadow 0.3s;
            cursor: pointer;
            padding: 25px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: center;
        }

        .game-icon-card:hover {
            transform: translateY(-8px);
            border-color: #cbd5e1;
            box-shadow: var(--shadow-md);
        }

        .game-icon-card.selected {
            border-color: var(--card-selected);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.15), var(--shadow-lg);
            transform: scale(1.06) translateY(-4px);
        }

        .game-icon { font-size: 54px; margin-bottom: 14px; line-height: 1; }
        .game-title { font-size: 13px; font-weight: 800; color: var(--text-color); margin: 0; }

        .lobby-action-bar {
            position: fixed; bottom: 40px; width: 100%; text-align: center; z-index: 90;
        }

        /* 2. 設定・説明画面 */
        .setup-panel {
            background-color: #ffffff;
            width: 90%;
            max-width: 820px;
            height: 85%;
            max-height: 520px;
            border-radius: 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--card-border);
            display: flex;
            overflow: hidden;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .setup-left {
            width: 50%;
            background-color: #f8fafc;
            border-right: 1px solid var(--card-border);
            padding: 35px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .illustration-container {
            width: 100%;
            height: 180px;
            background-color: #edf2f7;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            overflow: hidden;
            padding: 10px;
            box-sizing: border-box;
        }

        .illustration-container svg, .tut-visual svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .rule-text-box { width: 100%; text-align: left; }
        .rule-title { font-size: 24px; font-weight: 900; margin: 0 0 10px; color: var(--text-color); }
        .rule-desc { font-size: 13px; line-height: 1.6; color: var(--text-muted); margin: 0; white-space: normal; }

        .btn-read-tutorial {
            background-color: transparent;
            color: var(--accent-color);
            border: 1.5px solid var(--accent-color);
            font-size: 12px;
            font-weight: 800;
            padding: 8px 18px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }
        .btn-read-tutorial:hover {
            background-color: rgba(74, 144, 226, 0.08);
            transform: translateY(-1px);
        }

        .setup-right {
            width: 50%;
            padding: 35px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .config-title { font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 12px; text-transform: uppercase; }
        .config-group { margin-bottom: 25px; }
        .option-buttons { display: flex; gap: 10px; }
        
        .opt-btn {
            flex: 1;
            background-color: #f1f5f9;
            border: 2px solid transparent;
            color: var(--text-color);
            padding: 12px 10px;
            font-size: 13px;
            font-weight: 800;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .opt-btn:hover:not(:disabled) { background-color: #e2e8f0; }
        .opt-btn.active {
            background-color: #eff6ff;
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .opt-btn:disabled { opacity: 0.35; cursor: not-allowed; background-color: #f8fafc; }

        .action-group { display: flex; gap: 12px; margin-top: auto; }

        .btn-primary {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 14px 35px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.25);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 226, 0.35);
        }
        .btn-primary:disabled { background-color: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        .btn-secondary {
            background-color: #f1f5f9;
            color: var(--text-color);
            border: none;
            padding: 14px 25px;
            font-size: 14px;
            font-weight: 800;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-secondary:hover { background-color: #e2e8f0; }

        /* あそびかた全画面オーバーレイ */
        #tutorial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255,255,255,0.92);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 3000;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #tutorial-overlay.active { display: flex; opacity: 1; }

        .tutorial-card {
            background: #ffffff;
            width: 90%; max-width: 580px;
            border-radius: 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--card-border);
            padding: 35px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .close-tut-btn {
            position: absolute; top: 20px; right: 25px;
            background: none; border: none; font-size: 28px;
            color: var(--text-muted); cursor: pointer; line-height: 1;
        }
        .close-tut-btn:hover { color: var(--text-color); }

        .tut-title { font-size: 22px; font-weight: 900; margin: 0 0 5px; text-align: center; }
        .tut-step-num { font-size: 11px; font-weight: 800; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; text-align: center; }

        .tut-visual {
            width: 100%; height: 160px;
            background-color: #f8fafc;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
            padding: 10px; box-sizing: border-box;
        }

        .tut-desc {
            font-size: 14px; line-height: 1.7; color: var(--text-color);
            text-align: center; margin: 0; min-height: 50px;
            white-space: normal;
        }

        .tut-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 15px;
        }

        .tut-dots { display: flex; gap: 8px; }
        .tut-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #e2e8f0; transition: background-color 0.2s; }
        .tut-dot.active { background-color: var(--accent-color); }

        /* ゲームプレイ画面 */
        #game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; opacity: 0;
            transition: opacity 0.3s ease;
        }
        #game-overlay.active { display: flex; opacity: 1; }
        
        .game-bar {
            background-color: #1a1a1a; height: 50px;
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            justify-content: space-between; color: #ffffff;
        }

        .back-btn {
            background: none; border: none; color: #ffffff;
            font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;
            padding: 6px 12px; border-radius: 20px; transition: background-color 0.2s;
        }
        .back-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .game-iframe-container { flex-grow: 1; width: 100%; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        body.game-active header { opacity: 0; transform: translateY(-20px); pointer-events: none; }
    </style>
</head>
<body>

    <header id="lobby-header">
        <h1>Clubhouse Games</h1>
        <p>世界のボードゲーム、カードゲーム、カジュアルゲームコレクション</p>
    </header>

    <div class="screen-container">
        <!-- スクリーン1：カルーセル選択画面 -->
        <div class="screen active" id="screen-carousel">
            <div class="carousel-wrapper" id="game-carousel-wrapper">
                <div class="carousel" id="game-carousel">
                    <!-- JSでカードが生成されます -->
                </div>
            </div>
            <div class="lobby-action-bar">
                <button class="btn-primary" id="select-play-btn" onclick="goToSetup()" disabled>設定に進む</button>
            </div>
        </div>

        <!-- 設定・やり方説明画面 -->
        <div class="screen" id="screen-setup">
            <div class="setup-panel">
                <!-- 左：イラスト & 説明 -->
                <div class="setup-left">
                    <div class="illustration-container" id="illustration-box">
                        <!-- SVGイラストが動的に挿入されます -->
                    </div>
                    <div class="rule-text-box">
                        <h2 class="rule-title" id="setup-title">ゲーム名</h2>
                        <p class="rule-desc" id="setup-desc">説明文</p>
                        <button class="btn-read-tutorial" onclick="openTutorial()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                            あそびかたを読む
                        </button>
                    </div>
                </div>
                <!-- 右：対戦設定 & スタート -->
                <div class="setup-right">
                    <div>
                        <div class="config-group">
                            <div class="config-title">対戦モード</div>
                            <div class="option-buttons">
                                <button class="opt-btn active" id="mode-cpu-btn" onclick="setMode('vs_cpu')">🤖 CP対戦</button>
                                <button class="opt-btn" id="mode-player-btn" onclick="setMode('vs_player')">👥 2人対戦</button>
                            </div>
                        </div>

                        <div class="config-group" id="difficulty-group">
                            <div class="config-title">難易度</div>
                            <div class="option-buttons">
                                <button class="opt-btn" id="diff-easy-btn" onclick="setDiff('easy')">やさしい</button>
                                <button class="opt-btn active" id="diff-normal-btn" onclick="setDiff('normal')">ふつう</button>
                                <button class="opt-btn" id="diff-hard-btn" onclick="setDiff('hard')">つよい</button>
                            </div>
                        </div>
                    </div>

                    <div class="action-group">
                        <button class="btn-secondary" style="flex: 1;" onclick="goToCarousel()">戻る</button>
                        <button class="btn-primary" style="flex: 2;" onclick="playGame()">スタート</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- あそびかたオーバーレイ（ステップバイステップ） -->
    <div id="tutorial-overlay">
        <div class="tutorial-card">
            <button class="close-tut-btn" onclick="closeTutorial()">×</button>
            <div class="tut-step-num" id="tut-step-label">STEP 1 / 3</div>
            <h2 class="tut-title" id="tut-game-title">リバーシ</h2>
            
            <div class="tut-visual" id="tut-visual-box">
                <!-- SVGイラスト -->
            </div>
            
            <p class="tut-desc" id="tut-desc-text">ここに解説のテキストが表示されます。</p>
            
            <div class="tut-footer">
                <div class="tut-dots" id="tut-dots-box">
                    <div class="tut-dot active"></div>
                    <div class="tut-dot"></div>
                    <div class="tut-dot"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-secondary" id="tut-prev-btn" onclick="changeTutorialStep(-1)" style="padding: 8px 18px; font-size:12px;">前へ</button>
                    <button class="btn-primary" id="tut-next-btn" onclick="changeTutorialStep(1)" style="padding: 8px 18px; font-size:12px;">次へ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ゲームプレイ用フルスクリーンオーバーレイ -->
    <div id="game-overlay">
        <div class="game-bar">
            <button class="back-btn" onclick="closeGame()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                ロビーに戻る
            </button>
            <div style="font-weight: 600; font-size: 13px; letter-spacing: 1px; color: #bbbbbb;" id="current-game-title"></div>
            <div style="width: 100px;"></div>
        </div>
        <div class="game-iframe-container">
            <iframe id="game-frame" src=""></iframe>
        </div>
    </div>

    <script>
        let audioCtx = null;
        function playTickSound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.02);
                
                gain.gain.setValueAtTime(0.025, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);
            } catch (e) {
                console.log("Audio Context blocked", e);
            }
        }

        // 全30ゲームの完全メタデータ配列（不足していたスパイダー、モリス、ドミノ、および新ゲーム3作を完全統合）
        const gamesData = {
            reversi: { 
                title: 'リバーシ', icon: '⚪⚫', file: 'reversi.html', supports2P: true, 
                desc: 'お互いの石で相手の石を挟んでひっくり返していくボードゲーム。最終的に盤面に自分の色の石が多い方が勝利となります。', 
                illust: `<svg viewBox="0 0 100 100" width="100" height="100"><rect width="100" height="100" rx="12" fill="#1b4332"/><circle cx="35" cy="35" r="14" fill="#111"/><circle cx="65" cy="65" r="14" fill="#111"/><circle cx="35" cy="65" r="14" fill="#fff" stroke="#ccc" stroke-width="1"/><circle cx="65" cy="35" r="14" fill="#fff" stroke="#ccc" stroke-width="1"/></svg>`,
                steps: [
                    "盤面の中央にあらかじめ白黒2枚ずつ計4枚を配置した状態でスタート。黒が先手です。",
                    "自分の手札の色の石を、縦・横・斜めのいずれかで相手の石を挟める空いているマスに配置します。",
                    "挟まれた石はすべて自分の色に反転します。盤面がすべて埋まり、最後に多く自分の石を残した方の勝利です。"
                ]
            },
            mancala: { 
                title: 'マンカラ', icon: '🪵🔮', file: 'mancala.html', supports2P: true, 
                desc: '最古の知略ゲーム。自分のポケットから石を取って反時計回りに配っていき、自陣の石をすべてなくすか、ストアに多くの石を集めたプレイヤーの勝利です。', 
                illust: `<svg viewBox="0 0 100 100" width="100" height="100"><rect x="5" y="20" width="90" height="60" rx="15" fill="#8b5a2b" stroke="#563313" stroke-width="3"/><circle cx="20" cy="38" r="10" fill="#3c2009"/><circle cx="50" cy="38" r="10" fill="#3c2009"/><circle cx="80" cy="38" r="10" fill="#3c2009"/><circle cx="20" cy="62" r="10" fill="#3c2009"/><circle cx="50" cy="62" r="10" fill="#3c2009"/><circle cx="80" cy="62" r="10" fill="#3c2009"/><circle cx="50" cy="38" r="4" fill="#1982c4"/><circle cx="53" cy="41" r="4" fill="#ff595e"/><circle cx="47" cy="40" r="4" fill="#8ac926"/></svg>`,
                steps: [
                    "自陣の6つの穴（ポケット）の中から任意の1つを選び、中に入っている全てのビーズを手に取ります。",
                    "取ったビーズを手元から右方向（反時計回り）に向かって、自陣ストアも含めて1つずつ配っていきます（相手のストアは飛ばします）。",
                    "最後の1つが自分のストア（大きな穴）に入れば、もう一度ターンが得られます。自陣の穴が空になったらゲーム終了、多くの石を回収した方が勝ちです。"
                ]
            },
            connectfour: { 
                title: 'コネクトフォー', icon: '🟡🔴', file: 'connectfour.html', supports2P: true, 
                desc: '格子状のボードに上からチップを交互に落としていき、自分の色のチップを縦・横・斜めのいずれかで「4枚」一直線に並べたプレイヤーの勝利となります。', 
                illust: `<svg viewBox="0 0 100 100" width="100" height="100"><rect x="5" y="10" width="90" height="80" rx="10" fill="#005f73"/><circle cx="25" cy="30" r="10" fill="#ff4d4d"/><circle cx="50" cy="30" r="10" fill="#f4ede4"/><circle cx="75" cy="30" r="10" fill="#ff4d4d"/><circle cx="25" cy="60" r="10" fill="#fffb00"/><circle cx="50" cy="60" r="10" fill="#ff4d4d"/><circle cx="75" cy="60" r="10" fill="#fffb00"/></svg>`,
                steps: [
                    "縦7列・横6行の青いグリッドボードに、イエローとレッドが交互に上からチップをスライドして落とします。",
                    "チップはグリッドの一番下に自重でスライド落下して積み重なっていきます。",
                    "縦、横、斜めのどこか一方向に、自分のチップを一番最初に「4枚連続で一直線」に繋げたプレイヤーが勝ちとなります。"
                ]
            },
            hitandblow: { 
                title: 'ヒット＆ブロー', icon: '🎨🔍', file: 'hitandblow.html', supports2P: false, 
                desc: '相手が隠した4つの異なる色の配置を推測して当てるパズル。位置と色が合っていれば「ヒット」、色だけが合っていれば「ブロー」としてヒントが得られます。',

        const modeCpuBtn = document.getElementById('mode-cpu-btn');

        const gameOverlay = document.getElementById('game-overlay');
        const gameFrame = document.getElementById('game-frame');

        // チュートリアルモーダルの制御DOM
        const tutorialOverlay = document.getElementById('tutorial-overlay');
        const tutGameTitle = document.getElementById('tut-game-title');
        const tutVisualBox = document.getElementById('tut-visual-box');
        const tutDescText = document.getElementById('tut-desc-text');
        const tutStepLabel = document.getElementById('tut-step-label');
        const tutDotsBox = document.getElementById('tut-dots-box');

        let selectedId = null;
        let selectedMode = 'vs_cpu'; 
        let selectedDiff = 'normal'; 
        let tutorialCurrentStep = 0;

        function initCarousel() {
            carouselEl.innerHTML = '';
            Object.keys(gamesData).forEach(id => {
                const game = gamesData[id];
                const card = document.createElement('div');
                card.className = 'game-icon-card';
                card.dataset.id = id;
                card.innerHTML = `
                    <div class="game-icon">${game.icon}</div>
                    <div class="game-title">${game.title}</div>
                `;
                card.addEventListener('click', () => selectGame(id));
                carouselEl.appendChild(card);
            });

            const scrollWrapper = document.getElementById('game-carousel-wrapper');
            let lastScrollPos = 0;
            const scrollInterval = 85; 

            scrollWrapper.addEventListener('scroll', () => {
                const currentScroll = scrollWrapper.scrollLeft;
                if (Math.abs(currentScroll - lastScrollPos) > scrollInterval) {
                    playTickSound();
                    lastScrollPos = currentScroll;
                }
            });
        }

        function selectGame(id) {
            playTickSound();
            document.querySelectorAll('.game-icon-card').forEach(card => {
                card.classList.remove('selected');
            });
            const selectedCard = document.querySelector(`.game-icon-card[data-id="${id}"]`);
            if (selectedCard) {
                selectedCard.classList.add('selected');
                selectedCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
            selectedId = id;
            selectPlayBtn.disabled = false;
        }

        function goToSetup() {
            if (!selectedId) return;
            playTickSound();
            const game = gamesData[selectedId];

            setupTitle.innerText = game.title;
            setupDesc.innerText = game.desc;
            illustrationBox.innerHTML = game.illust;

            selectedMode = 'vs_cpu';
            selectedDiff = 'normal';
            updateConfigButtons();

            if (game.supports2P) {
                modePlayerBtn.disabled = false;
            } else {
                modePlayerBtn.disabled = true;
                setMode('vs_cpu'); 
            }

            screenCarousel.classList.remove('active');
            setTimeout(() => {
                screenSetup.classList.add('active');
            }, 150);
        }

        function updateConfigButtons() {
            modeCpuBtn.classList.toggle('active', selectedMode === 'vs_cpu');
            modePlayerBtn.classList.toggle('active', selectedMode === 'vs_player');

            if (selectedMode === 'vs_cpu') {
                difficultyGroup.style.display = 'block';
                document.getElementById('diff-easy-btn').classList.toggle('active', selectedDiff === 'easy');
                document.getElementById('diff-normal-btn').classList.toggle('active', selectedDiff === 'normal');
                document.getElementById('diff-hard-btn').classList.toggle('active', selectedDiff === 'hard');
            } else {
                difficultyGroup.style.display = 'none';
            }
        }

        function setMode(mode) {
            playTickSound();
            selectedMode = mode;
            updateConfigButtons();
        }

        function setDiff(diff) {
            playTickSound();
            selectedDiff = diff;
            updateConfigButtons();
        }

        function goToCarousel() {
            playTickSound();
            screenSetup.classList.remove('active');
            setTimeout(() => {
                screenCarousel.classList.add('active');
            }, 150);
        }

        function openTutorial() {
            playTickSound();
            if (!selectedId) return;
            const game = gamesData[selectedId];
            
            tutGameTitle.innerText = game.title;
            tutorialCurrentStep = 0;
            
            updateTutorialStepUI();
            
            tutorialOverlay.style.display = 'flex';
            setTimeout(() => {
                tutorialOverlay.classList.add('active');
            }, 10);
        }

        function updateTutorialStepUI() {
            const game = gamesData[selectedId];
            tutStepLabel.innerText = `STEP ${tutorialCurrentStep + 1} / 3`;
            tutDescText.innerText = game.steps[tutorialCurrentStep];
            tutVisualBox.innerHTML = game.illust; 

            tutDotsBox.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = `tut-dot ${i === tutorialCurrentStep ? 'active' : ''}`;
                tutDotsBox.appendChild(dot);
            }

            document.getElementById('tut-prev-btn').disabled = (tutorialCurrentStep === 0);
            if (tutorialCurrentStep === 2) {
                document.getElementById('tut-next-btn').innerText = "理解した";
            } else {
                document.getElementById('tut-next-btn').innerText = "次へ";
            }
        }

        function changeTutorialStep(dir) {
            playTickSound();
            if (dir === 1 && tutorialCurrentStep === 2) {
                closeTutorial();
                return;
            }
            tutorialCurrentStep = Math.max(0, Math.min(2, tutorialCurrentStep + dir));
            updateTutorialStepUI();
        }

        function closeTutorial() {
            playTickSound();
            tutorialOverlay.classList.remove('active');
            setTimeout(() => {
                tutorialOverlay.style.display = 'none';
            }, 300);
        }

        function playGame() {
            if (!selectedId) return;
            playTickSound();
            const game = gamesData[selectedId];
            
            let gameUrl = `${game.file}?mode=${selectedMode}`;
            if (selectedMode === 'vs_cpu') {
                gameUrl += `&diff=${selectedDiff}`;
            }

            gameFrame.src = gameUrl;
            overlayTitle.innerText = game.title;
            gameOverlay.style.display = 'flex';
            setTimeout(() => {
                gameOverlay.classList.add('active');
            }, 10);
            document.body.classList.add('game-active');
        }

        function closeGame() {
            playTickSound();
            gameOverlay.classList.remove('active');
            setTimeout(() => {
                gameOverlay.style.display = 'none';
                gameFrame.src = '';
            }, 300);
            document.body.classList.remove('game-active');
            
            goToCarousel();
            document.querySelectorAll('.game-icon-card').forEach(card => card.classList.remove('selected'));
            selectedId = null;
            selectPlayBtn.disabled = true;
        }

        initCarousel();
    </script>
</body>
</html>
